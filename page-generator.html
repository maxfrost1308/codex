<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text: #eee;
    --text-dim: #aaa;
    --border: #2a2a4a;
    --success: #2ecc71;
    --warning: #f39c12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--text-dim);
    margin-top: 4px;
    font-size: 14px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 12px 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .tab:hover:not(.active) {
    background: rgba(233, 69, 96, 0.1);
    color: var(--text);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .panel h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* Config grid */
  .config {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 12px;
    color: var(--text-dim);
  }

  .field input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 14px;
    width: 100%;
  }

  .field input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  @media (max-width: 640px) {
    .config { grid-template-columns: 1fr; }
  }

  /* Paper size toggle */
  .paper-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .paper-btn {
    padding: 8px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .paper-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Color swatches */
  .color-palette {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }

  .swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  .swatch:hover {
    transform: scale(1.15);
  }

  /* Range slider */
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  /* Preview */
  .preview-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
  }

  #previewCanvas {
    border: 1px solid var(--border);
    background: white;
    max-width: 100%;
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.2s;
  }

  .status-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
  }

  .status-text.done { color: var(--success); }
  .status-text.error { color: var(--accent); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Page Generator</h1>
    <p>Generate printable pages with dot-grid, ruled, square grid, isometric, and Cornell notes patterns.</p>
  </header>

  <!-- Page type tabs -->

<script>
const MM = 2.8346;
const PAPER_SIZES = {
  letter: { name: 'Letter', w: 612, h: 792 },
  a4:     { name: 'A4', w: 595.28, h: 841.89 }
};
const COLORS = [
  { name: 'Light Gray', rgb: [0.75, 0.75, 0.75], hex: '#BFBFBF' },
  { name: 'Blue',       rgb: [0.60, 0.73, 0.89], hex: '#99BAE3' },
  { name: 'Green',      rgb: [0.60, 0.80, 0.60], hex: '#99CC99' },
  { name: 'Sepia',      rgb: [0.76, 0.64, 0.47], hex: '#C2A378' },
  { name: 'Black',      rgb: [0.00, 0.00, 0.00], hex: '#000000' },
];
const PRESETS = {
  'dot-grid':    { spacing: 5, dotSize: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.5 },
  'ruled':       { spacing: 7, lineWeight: 0.3, margins: [15,15,25,15], color: 0, opacity: 0.4 },
  'square-grid': { spacing: 5, lineWeight: 0.25, margins: [15,15,15,15], color: 0, opacity: 0.4 },
  'isometric':   { spacing: 7, lineWeight: 0.25, margins: [15,15,15,15], color: 0, opacity: 0.35 },
  'cornell': {
    letter: { cueWidth: 63.5, summaryHeight: 50.8, lineSpacing: 7, lineWeight: 0.3, dividerWeight: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.4 },
    a4:     { cueWidth: 60,   summaryHeight: 48,   lineSpacing: 7, lineWeight: 0.3, dividerWeight: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.4 }
  }
};
const { PDFDocument, PageSizes, rgb } = PDFLib;

/* Draw stubs — TODO: implement in later tasks */
function drawDotGrid(page, config) {
  const { paperW, paperH, spacing, dotSize, marginTop, marginRight, marginBottom, marginLeft, color, opacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;

  for (let y = top; y >= bottom; y -= spacing) {
    for (let x = left; x <= right; x += spacing) {
      page.drawCircle({
        x,
        y,
        size: dotSize,
        color: rgb(r, g, b),
        opacity
      });
    }
  }
}
function drawRuled(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;

  for (let y = top; y >= bottom; y -= spacing) {
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: lineWeight,
      color: rgb(r, g, b),
      opacity
    });
  }
}
function drawSquareGrid(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  // Horizontal lines
  for (let y = top; y >= bottom; y -= spacing) {
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: lineWeight,
      color: c,
      opacity
    });
  }

  // Vertical lines
  for (let x = left; x <= right; x += spacing) {
    page.drawLine({
      start: { x, y: bottom },
      end: { x, y: top },
      thickness: lineWeight,
      color: c,
      opacity
    });
  }
}
function drawIsometric(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  const S3 = Math.sqrt(3);
  const verticalGap = spacing * S3 / 2;
  const diagHeight = top - bottom;
  const diagWidth = right - left;
  const farDist = diagWidth + diagHeight;

  function clipLine(x1, y1, x2, y2) {
    let tMin = 0, tMax = 1;
    const dx = x2 - x1, dy = y2 - y1;
    function clip(p, q) {
      if (p === 0) return q >= 0;
      const t = q / p;
      if (p < 0) { if (t > tMax) return false; if (t > tMin) tMin = t; }
      else { if (t < tMin) return false; if (t < tMax) tMax = t; }
      return true;
    }
    if (!clip(-dx, x1 - left)) return null;
    if (!clip(dx, right - x1)) return null;
    if (!clip(-dy, y1 - bottom)) return null;
    if (!clip(dy, top - y1)) return null;
    return [x1 + tMin * dx, y1 + tMin * dy, x1 + tMax * dx, y1 + tMax * dy];
  }

  function drawClipped(x1, y1, x2, y2) {
    const clipped = clipLine(x1, y1, x2, y2);
    if (!clipped) return;
    const [cx1, cy1, cx2, cy2] = clipped;
    page.drawLine({ start: { x: cx1, y: cy1 }, end: { x: cx2, y: cy2 }, thickness: lineWeight, color: c, opacity });
  }

  // 1. Horizontal lines at verticalGap intervals from top down to bottom
  for (let y = top; y >= bottom; y -= verticalGap) {
    drawClipped(left, y, right, y);
  }

  // 2. +60° lines (slope = +S3 in PDF coords, up-right): anchor at y=bottom
  // 3. -60° lines (slope = -S3 in PDF coords, down-right): anchor at y=top
  // Both use same x0 range: [left - diagHeight/S3, right], step = spacing
  for (let x0 = left - diagHeight / S3; x0 <= right; x0 += spacing) {
    // +60°: through (x0, bottom) — extend far in both directions, clip handles bounds
    drawClipped(x0 - farDist, bottom - farDist * S3, x0 + farDist, bottom + farDist * S3);
    // -60°: through (x0, top) — extend far in both directions, clip handles bounds
    drawClipped(x0 - farDist, top + farDist * S3, x0 + farDist, top - farDist * S3);
  }
}
function drawCornell(page, config) {
  const { paperW, paperH, cueWidth, summaryHeight, lineSpacing, lineWeight, dividerWeight,
          marginTop, marginRight, marginBottom, marginLeft, color, opacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  const cueX = left + cueWidth;
  const summaryY = marginBottom + summaryHeight;

  // 1. Vertical cue divider (from summary line up to top margin)
  page.drawLine({
    start: { x: cueX, y: summaryY },
    end: { x: cueX, y: top },
    thickness: dividerWeight,
    color: c,
    opacity
  });

  // 2. Summary horizontal divider (full width)
  page.drawLine({
    start: { x: left, y: summaryY },
    end: { x: right, y: summaryY },
    thickness: dividerWeight,
    color: c,
    opacity
  });

  // 3. Horizontal ruled lines (full width, from top down to just above summary divider)
  for (let y = top; y >= summaryY; y -= lineSpacing) {
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: lineWeight,
      color: c,
      opacity
    });
  }
}

/* Preview stubs — TODO: implement in later tasks */
function previewDotGrid(ctx, config) {
  const { paperW, paperH, spacing, dotSize, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasWidth, canvasHeight, scale } = config;
  const radius = (dotSize / 2) * scale;
  const [r, g, b] = color;

  ctx.fillStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;

  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += spacing) {
      const cx = pdfX * scale;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}
function previewRuled(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale } = config;
  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const [r, g, b] = color;

  ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.lineWidth = lineWeight * scale;

  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();
  }
}
function previewSquareGrid(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale } = config;
  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const bottom = marginBottom * scale;
  const top = (paperH - marginTop) * scale;
  const [r, g, b] = color;

  ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.lineWidth = lineWeight * scale;

  // Horizontal lines (canvas Y inverted)
  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();
  }

  // Vertical lines
  const canvasBottom = canvasHeight - bottom;
  const canvasTop = canvasHeight - top;
  for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += spacing) {
    const cx = pdfX * scale;
    ctx.beginPath();
    ctx.moveTo(cx, canvasTop);
    ctx.lineTo(cx, canvasBottom);
    ctx.stroke();
  }
}
function previewIsometric(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale } = config;
  const [r, g, b] = color;

  // Canvas drawable area bounds (PDF top → small canvas y; PDF bottom → large canvas y)
  const cLeft = marginLeft * scale;
  const cRight = (paperW - marginRight) * scale;
  const cBottom = canvasHeight - marginBottom * scale;
  const cTop = canvasHeight - (paperH - marginTop) * scale;

  ctx.save();
  ctx.beginPath();
  ctx.rect(cLeft, cTop, cRight - cLeft, cBottom - cTop);
  ctx.clip();

  ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.lineWidth = lineWeight * scale;

  const S3 = Math.sqrt(3);
  const vGap = spacing * S3 / 2 * scale;          // vertical gap between horizontal lines, in canvas px
  const spacingCanvas = spacing * scale;
  const diagHeight = cBottom - cTop;               // drawable height in canvas px
  const diagWidth = cRight - cLeft;
  const farDist = (diagWidth + diagHeight) * 2;

  function drawLine(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // 1. Horizontal lines: from cTop downward by vGap (canvas y increases downward)
  for (let cy = cTop; cy <= cBottom; cy += vGap) {
    drawLine(cLeft, cy, cRight, cy);
  }

  // 2. PDF +60° → canvas slope -S3 (up-right on screen), anchor at (cx0, cBottom)
  //    cy = cBottom - S3 * (cx - cx0)
  // 3. PDF -60° → canvas slope +S3 (down-right on screen), anchor at (cx0, cTop)
  //    cy = cTop + S3 * (cx - cx0)
  for (let cx0 = cLeft - diagHeight / S3; cx0 <= cRight; cx0 += spacingCanvas) {
    // +60° PDF (canvas up-right, slope -S3)
    drawLine(cx0 - farDist, cBottom + farDist * S3, cx0 + farDist, cBottom - farDist * S3);
    // -60° PDF (canvas down-right, slope +S3)
    drawLine(cx0 - farDist, cTop - farDist * S3, cx0 + farDist, cTop + farDist * S3);
  }

  ctx.restore();
}
function previewCornell(ctx, config) {
  const { paperW, paperH, cueWidth, summaryHeight, lineSpacing, lineWeight, dividerWeight,
          marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale } = config;
  const [r, g, b] = color;

  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const canvasTop = canvasHeight - (paperH - marginTop) * scale;

  const cueX = left + cueWidth * scale;
  const summaryY_pdf = marginBottom + summaryHeight;
  const summaryY = canvasHeight - summaryY_pdf * scale;

  const rgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.strokeStyle = rgba;

  // 1. Vertical cue divider
  ctx.lineWidth = dividerWeight * scale;
  ctx.beginPath();
  ctx.moveTo(cueX, summaryY);
  ctx.lineTo(cueX, canvasTop);
  ctx.stroke();

  // 2. Summary horizontal divider
  ctx.lineWidth = dividerWeight * scale;
  ctx.beginPath();
  ctx.moveTo(left, summaryY);
  ctx.lineTo(right, summaryY);
  ctx.stroke();

  // 3. Ruled lines (full width, from top down to summary divider)
  ctx.lineWidth = lineWeight * scale;
  for (let pdfY = (paperH - marginTop); pdfY >= (marginBottom + summaryHeight); pdfY -= lineSpacing) {
    const cy = canvasHeight - pdfY * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();
  }
}

/* downloadBlob — fully implemented */
function downloadBlob(bytes, filename, mime) {
  const blob = new Blob([bytes], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* Event listeners */
document.addEventListener('DOMContentLoaded', () => {
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      const type = tab.dataset.type;
      document.getElementById('panel-' + type).classList.add('active');
      loadPreset(type);
    });
  });

  // Swatch selection
  document.querySelectorAll('.swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
    });
  });

  // Paper size toggle
  document.querySelectorAll('.paper-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.paper-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Generate button
  document.getElementById('generateBtn').addEventListener('click', generatePDF);
});
