<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text: #eee;
    --text-dim: #aaa;
    --border: #2a2a4a;
    --success: #2ecc71;
    --warning: #f39c12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--text-dim);
    margin-top: 4px;
    font-size: 14px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 12px 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .tab:hover:not(.active) {
    background: rgba(233, 69, 96, 0.1);
    color: var(--text);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .panel h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* Config grid */
  .config {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 12px;
    color: var(--text-dim);
  }

  .field input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 14px;
    width: 100%;
  }

  .field input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  @media (max-width: 640px) {
    .config { grid-template-columns: 1fr; }
  }

  /* Paper size toggle */
  .paper-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .paper-btn {
    padding: 8px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .paper-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Color swatches */
  .color-palette {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }

  .swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  .swatch:hover {
    transform: scale(1.15);
  }

  /* Range slider */
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  /* Preview */
  .preview-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
  }

  #previewCanvas {
    border: 1px solid var(--border);
    background: white;
    max-width: 100%;
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.2s;
  }

  .status-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
  }

  .status-text.done { color: var(--success); }
  .status-text.error { color: var(--accent); }
  .hidden { display: none !important; }

  .margin-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .margin-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .margin-swatch:hover {
    transform: scale(1.15);
  }
  .checkbox-field {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .checkbox-field label {
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  .margin-palette {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Page Generator</h1>
    <p>Generate printable pages with dot-grid, ruled, square grid, isometric, and Cornell notes patterns.</p>
  </header>

  <!-- Page type tabs -->
  <div class="tabs">
    <button class="tab active" data-type="dot-grid">Dot Grid</button>
    <button class="tab" data-type="ruled">Ruled</button>
    <button class="tab" data-type="square-grid">Square Grid</button>
    <button class="tab" data-type="isometric">Isometric</button>
    <button class="tab" data-type="cornell">Cornell Notes</button>
  </div>

  <!-- Dot Grid Panel -->
  <div class="tab-content active" id="panel-dot-grid">
    <div class="panel">
      <h3>Dot Grid Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="dot-grid-spacing" min="3" max="20" step="0.5" value="5">
        </div>
        <div class="field">
          <label>Dot Size (mm)</label>
          <input type="number" id="dot-grid-dotSize" min="0.3" max="3" step="0.1" value="0.8">
        </div>
        <div class="field">
          <label>Dot Shape</label>
          <select id="dot-grid-shape" style="background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%;">
            <option value="circle">Circle (●)</option>
            <option value="cross">Cross (+)</option>
            <option value="x">X (×)</option>
            <option value="square">Square (■)</option>
          </select>
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="dot-grid-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="dot-grid-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="dot-grid-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="dot-grid-marginLeft" min="0" max="50" step="1" value="15">
        </div>
      </div>
    </div>
  </div>

  <!-- Ruled Panel -->
  <div class="tab-content" id="panel-ruled">
    <div class="panel">
      <h3>Ruled Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="ruled-spacing" min="3" max="20" step="0.5" value="7">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="ruled-lineWeight" min="0.1" max="2" step="0.1" value="0.3">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="ruled-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="ruled-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="ruled-marginBottom" min="0" max="50" step="1" value="25">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
            <input type="number" id="ruled-marginLeft" min="0" max="50" step="1" value="15">
          </div>
      </div>
      <!-- Margin line controls -->
      <div class="checkbox-field" style="margin-top: 12px;">
        <input type="checkbox" id="ruled-marginLine">
        <label for="ruled-marginLine">Show margin line</label>
      </div>
      <div id="ruled-marginLine-controls" style="display:none; margin-top: 8px;">
        <div class="margin-palette">
          <button class="margin-swatch active" data-margin-rgb="0.89,0.27,0.27" style="background:#E24444" title="Red"></button>
          <button class="margin-swatch" data-margin-rgb="0.27,0.47,0.80" style="background:#4477CC" title="Blue"></button>
          <button class="margin-swatch" data-margin-rgb="0.20,0.20,0.20" style="background:#333333" title="Black"></button>
          <button class="margin-swatch" data-margin-rgb="0.60,0.60,0.60" style="background:#999999" title="Gray"></button>
        </div>
        <div class="config" style="margin-top: 8px; margin-bottom: 0;">
          <div class="field">
            <label>Margin Line Weight (mm)</label>
            <input type="number" id="ruled-marginLineWeight" min="0.2" max="3" step="0.1" value="0.5">
          </div>
          <div class="field">
            <label>Margin Line Position (mm)</label>
            <input type="number" id="ruled-marginLinePosition" min="5" max="100" step="1" value="15">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Square Grid Panel -->
  <div class="tab-content" id="panel-square-grid">
    <div class="panel">
      <h3>Square Grid Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="square-grid-spacing" min="3" max="20" step="0.5" value="5">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="square-grid-lineWeight" min="0.1" max="2" step="0.1" value="0.25">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="square-grid-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="square-grid-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="square-grid-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="square-grid-marginLeft" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Major Line Every (N)</label>
          <input type="number" id="square-grid-majorInterval" min="0" max="20" step="1" value="0">
        </div>
        <div class="field" id="square-grid-majorWeight-field" style="display:none">
          <label>Major Line Weight (mm)</label>
          <input type="number" id="square-grid-majorWeight" min="0.2" max="4" step="0.1" value="0.5">
        </div>
        <div class="field" id="square-grid-majorOpacity-field" style="display:none">
          <label>Major Line Opacity</label>
          <input type="number" id="square-grid-majorOpacity" min="0.1" max="1" step="0.05" value="0.7">
        </div>
      </div>
    </div>
  </div>

  <!-- Isometric Panel -->
  <div class="tab-content" id="panel-isometric">
    <div class="panel">
      <h3>Isometric Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="isometric-spacing" min="3" max="20" step="0.5" value="7">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="isometric-lineWeight" min="0.1" max="2" step="0.1" value="0.25">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="isometric-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="isometric-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="isometric-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="isometric-marginLeft" min="0" max="50" step="1" value="15">
        </div>
      </div>
    </div>
  </div>

  <!-- Cornell Panel -->
  <div class="tab-content" id="panel-cornell">
    <div class="panel">
      <h3>Cornell Notes Settings</h3>
      <div class="config">
        <div class="field">
          <label>Cue Width (mm)</label>
          <input type="number" id="cornell-cueWidth" min="30" max="100" step="1" value="63.5">
        </div>
        <div class="field">
          <label>Summary Height (mm)</label>
          <input type="number" id="cornell-summaryHeight" min="20" max="80" step="1" value="50.8">
        </div>
        <div class="field">
          <label>Line Spacing (mm)</label>
          <input type="number" id="cornell-lineSpacing" min="3" max="20" step="0.5" value="7">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="cornell-lineWeight" min="0.1" max="2" step="0.1" value="0.3">
        </div>
        <div class="field">
          <label>Divider Weight (mm)</label>
          <input type="number" id="cornell-dividerWeight" min="0.3" max="3" step="0.1" value="0.8">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="cornell-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="cornell-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="cornell-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="cornell-marginLeft" min="0" max="50" step="1" value="15">
        </div>
      </div>
    </div>
  </div>

  <!-- Paper size toggle -->
  <div class="paper-toggle">
    <button class="paper-btn active" data-size="letter">Letter</button>
    <button class="paper-btn" data-size="a4">A4</button>
  </div>

  <!-- Color swatches -->
  <div class="color-palette">
    <button class="swatch active" data-name="Light Gray" data-rgb="0.75,0.75,0.75" style="background:#BFBFBF" title="Light Gray"></button>
    <button class="swatch" data-name="Blue" data-rgb="0.60,0.73,0.89" style="background:#99BAE3" title="Blue"></button>
    <button class="swatch" data-name="Green" data-rgb="0.60,0.80,0.60" style="background:#99CC99" title="Green"></button>
    <button class="swatch" data-name="Sepia" data-rgb="0.76,0.64,0.47" style="background:#C2A378" title="Sepia"></button>
    <button class="swatch" data-name="Black" data-rgb="0.00,0.00,0.00" style="background:#000000" title="Black"></button>
  </div>

  <!-- Opacity slider -->
  <div class="field">
    <label>Opacity: <span id="opacityLabel">0.50</span></label>
    <input type="range" id="opacitySlider" min="0.05" max="1" step="0.05" value="0.5">
  </div>

  <!-- Page count -->
  <div class="field" style="margin-top: 12px;">
    <label>Page Count</label>
    <input type="number" id="pageCount" min="1" max="200" step="1" value="1">
  </div>

  <!-- Canvas preview -->
  <div class="preview-container" style="margin-top: 16px;">
    <canvas id="previewCanvas" width="340" height="440"></canvas>
  </div>

  <!-- Generate button -->
  <button class="generate-btn" id="generateBtn">Generate PDF</button>

  <!-- Progress bar -->
  <div id="progressContainer" class="hidden">
    <div class="progress-bar"><div class="fill" id="progressFill" style="width: 0%"></div></div>
    <div class="status-text" id="statusText">Preparing...</div>
  </div>
</div>

<script>
const MM = 2.8346;
const PAPER_SIZES = {
  letter: { name: 'Letter', w: 612, h: 792 },
  a4:     { name: 'A4', w: 595.28, h: 841.89 }
};
const COLORS = [
  { name: 'Light Gray', rgb: [0.75, 0.75, 0.75], hex: '#BFBFBF' },
  { name: 'Blue',       rgb: [0.60, 0.73, 0.89], hex: '#99BAE3' },
  { name: 'Green',      rgb: [0.60, 0.80, 0.60], hex: '#99CC99' },
  { name: 'Sepia',      rgb: [0.76, 0.64, 0.47], hex: '#C2A378' },
  { name: 'Black',      rgb: [0.00, 0.00, 0.00], hex: '#000000' },
];
const PRESETS = {
  'dot-grid':    { spacing: 5, dotSize: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.5, shape: 'circle' },
  'ruled':       { spacing: 7, lineWeight: 0.3, margins: [15,15,25,15], color: 0, opacity: 0.4, marginLine: false, marginLineColor: [0.89, 0.27, 0.27], marginLineWeight: 0.5, marginLinePosition: 15 },
  'square-grid': { spacing: 5, lineWeight: 0.25, margins: [15,15,15,15], color: 0, opacity: 0.4, majorInterval: 0, majorWeight: 0.5, majorOpacity: 0.7 },
  'isometric':   { spacing: 7, lineWeight: 0.25, margins: [15,15,15,15], color: 0, opacity: 0.35 },
  'cornell': {
    letter: { cueWidth: 63.5, summaryHeight: 50.8, lineSpacing: 7, lineWeight: 0.3, dividerWeight: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.4 },
    a4:     { cueWidth: 60,   summaryHeight: 48,   lineSpacing: 7, lineWeight: 0.3, dividerWeight: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.4 }
  }
};
const { PDFDocument, rgb } = PDFLib;

/* Draw functions */
function drawDotGrid(page, config) {
  const { paperW, paperH, spacing, dotSize, marginTop, marginRight, marginBottom, marginLeft, color, opacity, shape = 'circle' } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);
  const armLen = dotSize / 2;
  const thickness = dotSize * 0.25;

  for (let y = top; y >= bottom; y -= spacing) {
    for (let x = left; x <= right; x += spacing) {
      if (shape === 'circle') {
        page.drawCircle({ x, y, size: dotSize, color: c, opacity });
      } else if (shape === 'cross') {
        page.drawLine({ start: { x: x - armLen, y }, end: { x: x + armLen, y }, thickness, color: c, opacity });
        page.drawLine({ start: { x, y: y - armLen }, end: { x, y: y + armLen }, thickness, color: c, opacity });
      } else if (shape === 'x') {
        const d = armLen * Math.SQRT1_2;
        page.drawLine({ start: { x: x - d, y: y - d }, end: { x: x + d, y: y + d }, thickness, color: c, opacity });
        page.drawLine({ start: { x: x - d, y: y + d }, end: { x: x + d, y: y - d }, thickness, color: c, opacity });
      } else if (shape === 'square') {
        page.drawRectangle({ x: x - dotSize / 2, y: y - dotSize / 2, width: dotSize, height: dotSize, color: c, opacity });
      }
    }
  }
}
function drawRuled(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity,
          marginLine = false, marginLineColor, marginLineWeight, marginLinePosition } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;

  for (let y = top; y >= bottom; y -= spacing) {
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: lineWeight,
      color: rgb(r, g, b),
      opacity
    });
  }

  if (marginLine && marginLineColor && marginLineWeight && marginLinePosition) {
    const [mr, mg, mb] = marginLineColor;
    page.drawLine({
      start: { x: marginLinePosition, y: bottom },
      end: { x: marginLinePosition, y: top },
      thickness: marginLineWeight,
      color: rgb(mr, mg, mb),
      opacity: 1.0
    });
  }
}
function drawSquareGrid(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity,
          majorInterval = 0, majorWeight, majorOpacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  // Horizontal lines
  let hIdx = 0;
  for (let y = top; y >= bottom; y -= spacing) {
    const isMajor = majorInterval > 0 && hIdx % majorInterval === 0;
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: isMajor ? majorWeight : lineWeight,
      color: c,
      opacity: isMajor ? majorOpacity : opacity
    });
    hIdx++;
  }

  // Vertical lines
  let vIdx = 0;
  for (let x = left; x <= right; x += spacing) {
    const isMajor = majorInterval > 0 && vIdx % majorInterval === 0;
    page.drawLine({
      start: { x, y: bottom },
      end: { x, y: top },
      thickness: isMajor ? majorWeight : lineWeight,
      color: c,
      opacity: isMajor ? majorOpacity : opacity
    });
    vIdx++;
  }
}
function drawIsometric(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  const S3 = Math.sqrt(3);
  const verticalGap = spacing * S3 / 2;
  const diagHeight = top - bottom;
  const diagWidth = right - left;
  const farDist = diagWidth + diagHeight;

  function clipLine(x1, y1, x2, y2) {
    let tMin = 0, tMax = 1;
    const dx = x2 - x1, dy = y2 - y1;
    function clip(p, q) {
      if (p === 0) return q >= 0;
      const t = q / p;
      if (p < 0) { if (t > tMax) return false; if (t > tMin) tMin = t; }
      else { if (t < tMin) return false; if (t < tMax) tMax = t; }
      return true;
    }
    if (!clip(-dx, x1 - left)) return null;
    if (!clip(dx, right - x1)) return null;
    if (!clip(-dy, y1 - bottom)) return null;
    if (!clip(dy, top - y1)) return null;
    return [x1 + tMin * dx, y1 + tMin * dy, x1 + tMax * dx, y1 + tMax * dy];
  }

  function drawClipped(x1, y1, x2, y2) {
    const clipped = clipLine(x1, y1, x2, y2);
    if (!clipped) return;
    const [cx1, cy1, cx2, cy2] = clipped;
    page.drawLine({ start: { x: cx1, y: cy1 }, end: { x: cx2, y: cy2 }, thickness: lineWeight, color: c, opacity });
  }

  // 1. Horizontal lines at verticalGap intervals from top down to bottom
  for (let y = top; y >= bottom; y -= verticalGap) {
    drawClipped(left, y, right, y);
  }

  // 2. +60° lines (slope = +S3 in PDF coords, up-right): anchor at y=bottom
  // 3. -60° lines (slope = -S3 in PDF coords, down-right): anchor at y=top
  // Both use same x0 range: [left - diagHeight/S3, right], step = spacing
  for (let x0 = left - diagHeight / S3; x0 <= right; x0 += spacing) {
    // +60°: through (x0, bottom) — extend far in both directions, clip handles bounds
    drawClipped(x0 - farDist, bottom - farDist * S3, x0 + farDist, bottom + farDist * S3);
    // -60°: through (x0, top) — extend far in both directions, clip handles bounds
    drawClipped(x0 - farDist, top + farDist * S3, x0 + farDist, top - farDist * S3);
  }
}
function drawCornell(page, config) {
  const { paperW, paperH, cueWidth, summaryHeight, lineSpacing, lineWeight, dividerWeight,
          marginTop, marginRight, marginBottom, marginLeft, color, opacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  const cueX = left + cueWidth;
  const summaryY = marginBottom + summaryHeight;

  // 1. Vertical cue divider (from summary line up to top margin)
  page.drawLine({
    start: { x: cueX, y: summaryY },
    end: { x: cueX, y: top },
    thickness: dividerWeight,
    color: c,
    opacity
  });

  // 2. Summary horizontal divider (full width)
  page.drawLine({
    start: { x: left, y: summaryY },
    end: { x: right, y: summaryY },
    thickness: dividerWeight,
    color: c,
    opacity
  });

  // 3. Horizontal ruled lines (full width, from top down to bottom margin)
  for (let y = top; y >= marginBottom; y -= lineSpacing) {
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: lineWeight,
      color: c,
      opacity
    });
  }
}

/* Preview functions */
function previewDotGrid(ctx, config) {
  const { paperW, paperH, spacing, dotSize, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasWidth, canvasHeight, scale, shape = 'circle' } = config;
  const radius = (dotSize / 2) * scale;
  const [r, g, b] = color;
  const rgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  const armLen = radius;
  const lineWidth = radius * 0.5;

  ctx.fillStyle = rgba;
  ctx.strokeStyle = rgba;

  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += spacing) {
      const cx = pdfX * scale;
      if (shape === 'circle') {
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
      } else if (shape === 'cross') {
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(cx - armLen, cy);
        ctx.lineTo(cx + armLen, cy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, cy - armLen);
        ctx.lineTo(cx, cy + armLen);
        ctx.stroke();
      } else if (shape === 'x') {
        const d = armLen * Math.SQRT1_2;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(cx - d, cy - d);
        ctx.lineTo(cx + d, cy + d);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx - d, cy + d);
        ctx.lineTo(cx + d, cy - d);
        ctx.stroke();
      } else if (shape === 'square') {
        ctx.fillRect(cx - radius, cy - radius, dotSize * scale, dotSize * scale);
      }
    }
  }
}
function previewRuled(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale,
          marginLine = false, marginLineColor, marginLineWeight, marginLinePosition } = config;
  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const [r, g, b] = color;

  ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.lineWidth = lineWeight * scale;

  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();
  }

  if (marginLine && marginLineColor && marginLineWeight && marginLinePosition) {
    const [mr, mg, mb] = marginLineColor;
    const cx = marginLinePosition * scale;
    const cTop = canvasHeight - (paperH - marginTop) * scale;
    const cBottom = canvasHeight - marginBottom * scale;
    ctx.strokeStyle = `rgba(${Math.round(mr * 255)}, ${Math.round(mg * 255)}, ${Math.round(mb * 255)}, 1.0)`;
    ctx.lineWidth = marginLineWeight * scale;
    ctx.beginPath();
    ctx.moveTo(cx, cTop);
    ctx.lineTo(cx, cBottom);
    ctx.stroke();
  }
}
function previewSquareGrid(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale,
          majorInterval = 0, majorWeight, majorOpacity } = config;
  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const bottom = marginBottom * scale;
  const top = (paperH - marginTop) * scale;
  const [r, g, b] = color;

  const baseRgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  const majorRgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${majorOpacity})`;

  // Horizontal lines (canvas Y inverted)
  let hIdx = 0;
  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    const isMajor = majorInterval > 0 && hIdx % majorInterval === 0;
    ctx.strokeStyle = isMajor ? majorRgba : baseRgba;
    ctx.lineWidth = (isMajor ? majorWeight : lineWeight) * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();
    hIdx++;
  }

  // Vertical lines
  const canvasBottom = canvasHeight - bottom;
  const canvasTop = canvasHeight - top;
  let vIdx = 0;
  for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += spacing) {
    const cx = pdfX * scale;
    const isMajor = majorInterval > 0 && vIdx % majorInterval === 0;
    ctx.strokeStyle = isMajor ? majorRgba : baseRgba;
    ctx.lineWidth = (isMajor ? majorWeight : lineWeight) * scale;
    ctx.beginPath();
    ctx.moveTo(cx, canvasTop);
    ctx.lineTo(cx, canvasBottom);
    ctx.stroke();
    vIdx++;
  }
}
function previewIsometric(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale } = config;
  const [r, g, b] = color;

  // Canvas drawable area bounds (PDF top → small canvas y; PDF bottom → large canvas y)
  const cLeft = marginLeft * scale;
  const cRight = (paperW - marginRight) * scale;
  const cBottom = canvasHeight - marginBottom * scale;
  const cTop = canvasHeight - (paperH - marginTop) * scale;

  ctx.save();
  ctx.beginPath();
  ctx.rect(cLeft, cTop, cRight - cLeft, cBottom - cTop);
  ctx.clip();

  ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.lineWidth = lineWeight * scale;

  const S3 = Math.sqrt(3);
  const vGap = spacing * S3 / 2 * scale;          // vertical gap between horizontal lines, in canvas px
  const spacingCanvas = spacing * scale;
  const diagHeight = cBottom - cTop;               // drawable height in canvas px
  const diagWidth = cRight - cLeft;
  const farDist = (diagWidth + diagHeight) * 2;

  function drawLine(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // 1. Horizontal lines: from cTop downward by vGap (canvas y increases downward)
  for (let cy = cTop; cy <= cBottom; cy += vGap) {
    drawLine(cLeft, cy, cRight, cy);
  }

  // 2. PDF +60° → canvas slope -S3 (up-right on screen), anchor at (cx0, cBottom)
  //    cy = cBottom - S3 * (cx - cx0)
  // 3. PDF -60° → canvas slope +S3 (down-right on screen), anchor at (cx0, cTop)
  //    cy = cTop + S3 * (cx - cx0)
  for (let cx0 = cLeft - diagHeight / S3; cx0 <= cRight; cx0 += spacingCanvas) {
    // +60° PDF (canvas up-right, slope -S3)
    drawLine(cx0 - farDist, cBottom + farDist * S3, cx0 + farDist, cBottom - farDist * S3);
    // -60° PDF (canvas down-right, slope +S3)
    drawLine(cx0 - farDist, cTop - farDist * S3, cx0 + farDist, cTop + farDist * S3);
  }

  ctx.restore();
}
function previewCornell(ctx, config) {
  const { paperW, paperH, cueWidth, summaryHeight, lineSpacing, lineWeight, dividerWeight,
          marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale } = config;
  const [r, g, b] = color;

  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const canvasTop = canvasHeight - (paperH - marginTop) * scale;

  const cueX = left + cueWidth * scale;
  const summaryY_pdf = marginBottom + summaryHeight;
  const summaryY = canvasHeight - summaryY_pdf * scale;

  const rgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.strokeStyle = rgba;

  // 1. Vertical cue divider
  ctx.lineWidth = dividerWeight * scale;
  ctx.beginPath();
  ctx.moveTo(cueX, summaryY);
  ctx.lineTo(cueX, canvasTop);
  ctx.stroke();

  // 2. Summary horizontal divider
  ctx.lineWidth = dividerWeight * scale;
  ctx.beginPath();
  ctx.moveTo(left, summaryY);
  ctx.lineTo(right, summaryY);
  ctx.stroke();

  // 3. Ruled lines (full width, from top down to bottom margin)
  ctx.lineWidth = lineWeight * scale;
  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= lineSpacing) {
    const cy = canvasHeight - pdfY * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();
  }
}

/* ── getConfig ── reads form state, returns config with mm→pt conversion ── */
function getConfig() {
  const activeTab = document.querySelector('.tab.active');
  const type = activeTab.dataset.type;

  const paperSizeKey = document.querySelector('.paper-btn.active').dataset.size;
  const paper = PAPER_SIZES[paperSizeKey];

  const activeSwatch = document.querySelector('.swatch.active');
  const colorRgb = activeSwatch.dataset.rgb.split(',').map(Number);

  const opacity = parseFloat(document.getElementById('opacitySlider').value);
  const pageCount = parseInt(document.getElementById('pageCount').value, 10);

  let params = {};
  if (type === 'dot-grid') {
    params = {
      spacing:      parseFloat(document.getElementById('dot-grid-spacing').value)      * MM,
      dotSize:      parseFloat(document.getElementById('dot-grid-dotSize').value)      * MM,
      shape:        document.getElementById('dot-grid-shape').value,
      marginTop:    parseFloat(document.getElementById('dot-grid-marginTop').value)    * MM,
      marginRight:  parseFloat(document.getElementById('dot-grid-marginRight').value)  * MM,
      marginBottom: parseFloat(document.getElementById('dot-grid-marginBottom').value) * MM,
      marginLeft:   parseFloat(document.getElementById('dot-grid-marginLeft').value)   * MM,
    };
  } else if (type === 'ruled') {
    params = {
      spacing:      parseFloat(document.getElementById('ruled-spacing').value)      * MM,
      lineWeight:   parseFloat(document.getElementById('ruled-lineWeight').value)   * MM,
      marginTop:    parseFloat(document.getElementById('ruled-marginTop').value)    * MM,
      marginRight:  parseFloat(document.getElementById('ruled-marginRight').value)  * MM,
      marginBottom: parseFloat(document.getElementById('ruled-marginBottom').value) * MM,
      marginLeft:   parseFloat(document.getElementById('ruled-marginLeft').value)   * MM,
      marginLine:         document.getElementById('ruled-marginLine').checked,
      marginLineColor:    (() => {
        const active = document.querySelector('.margin-swatch.active');
        return active ? active.dataset.marginRgb.split(',').map(Number) : [0.89, 0.27, 0.27];
      })(),
      marginLineWeight:   parseFloat(document.getElementById('ruled-marginLineWeight').value) * MM,
      marginLinePosition: parseFloat(document.getElementById('ruled-marginLinePosition').value) * MM,
    };
  } else if (type === 'square-grid') {
    params = {
      spacing:      parseFloat(document.getElementById('square-grid-spacing').value)      * MM,
      lineWeight:   parseFloat(document.getElementById('square-grid-lineWeight').value)   * MM,
      marginTop:    parseFloat(document.getElementById('square-grid-marginTop').value)    * MM,
      marginRight:  parseFloat(document.getElementById('square-grid-marginRight').value)  * MM,
      marginBottom: parseFloat(document.getElementById('square-grid-marginBottom').value) * MM,
      marginLeft:   parseFloat(document.getElementById('square-grid-marginLeft').value)   * MM,
      majorInterval: parseInt(document.getElementById('square-grid-majorInterval').value) || 0,
      majorWeight:   parseFloat(document.getElementById('square-grid-majorWeight').value)   * MM,
      majorOpacity:  parseFloat(document.getElementById('square-grid-majorOpacity').value),
    };
  } else if (type === 'isometric') {
    params = {
      spacing:      parseFloat(document.getElementById('isometric-spacing').value)      * MM,
      lineWeight:   parseFloat(document.getElementById('isometric-lineWeight').value)   * MM,
      marginTop:    parseFloat(document.getElementById('isometric-marginTop').value)    * MM,
      marginRight:  parseFloat(document.getElementById('isometric-marginRight').value)  * MM,
      marginBottom: parseFloat(document.getElementById('isometric-marginBottom').value) * MM,
      marginLeft:   parseFloat(document.getElementById('isometric-marginLeft').value)   * MM,
    };
  } else if (type === 'cornell') {
    params = {
      cueWidth:       parseFloat(document.getElementById('cornell-cueWidth').value)       * MM,
      summaryHeight:  parseFloat(document.getElementById('cornell-summaryHeight').value)  * MM,
      lineSpacing:    parseFloat(document.getElementById('cornell-lineSpacing').value)    * MM,
      lineWeight:     parseFloat(document.getElementById('cornell-lineWeight').value)     * MM,
      dividerWeight:  parseFloat(document.getElementById('cornell-dividerWeight').value)  * MM,
      marginTop:      parseFloat(document.getElementById('cornell-marginTop').value)      * MM,
      marginRight:    parseFloat(document.getElementById('cornell-marginRight').value)    * MM,
      marginBottom:   parseFloat(document.getElementById('cornell-marginBottom').value)   * MM,
      marginLeft:     parseFloat(document.getElementById('cornell-marginLeft').value)     * MM,
    };
  }

  return {
    type,
    paperW: paper.w,
    paperH: paper.h,
    paperName: paper.name,
    paperSizeKey,
    color: colorRgb,
    opacity,
    pageCount,
    ...params
  };
}

/* ── loadPreset ── populates form inputs from PRESETS ── */
function loadPreset(type) {
  let preset;
  if (type === 'cornell') {
    const sizeKey = document.querySelector('.paper-btn.active').dataset.size;
    preset = PRESETS.cornell[sizeKey];
  } else {
    preset = PRESETS[type];
  }
  if (!preset) return;

  // Color swatch
  document.querySelectorAll('.swatch').forEach((s, i) => {
    s.classList.toggle('active', i === preset.color);
  });

  // Opacity
  document.getElementById('opacitySlider').value = preset.opacity;
  document.getElementById('opacityLabel').textContent = preset.opacity.toFixed(2);

  const margins = preset.margins; // [top, right, bottom, left]

  if (type === 'dot-grid') {
    document.getElementById('dot-grid-spacing').value  = preset.spacing;
    document.getElementById('dot-grid-dotSize').value  = preset.dotSize;
    document.getElementById('dot-grid-marginTop').value    = margins[0];
    document.getElementById('dot-grid-marginRight').value  = margins[1];
    document.getElementById('dot-grid-marginBottom').value = margins[2];
    document.getElementById('dot-grid-marginLeft').value   = margins[3];
    document.getElementById('dot-grid-shape').value = preset.shape ?? 'circle';
  } else if (type === 'ruled') {
    document.getElementById('ruled-spacing').value     = preset.spacing;
    document.getElementById('ruled-lineWeight').value  = preset.lineWeight;
    document.getElementById('ruled-marginTop').value    = margins[0];
    document.getElementById('ruled-marginRight').value  = margins[1];
    document.getElementById('ruled-marginBottom').value = margins[2];
    document.getElementById('ruled-marginLeft').value   = margins[3];
    document.getElementById('ruled-marginLine').checked = preset.marginLine ?? false;
    document.getElementById('ruled-marginLineWeight').value = preset.marginLineWeight ?? 0.5;
    document.getElementById('ruled-marginLinePosition').value = preset.marginLinePosition ?? 15;
    document.getElementById('ruled-marginLine-controls').style.display = (preset.marginLine ?? false) ? '' : 'none';
    document.querySelectorAll('.margin-swatch').forEach((s, i) => {
      s.classList.toggle('active', i === 0);
    });
  } else if (type === 'square-grid') {
    document.getElementById('square-grid-spacing').value    = preset.spacing;
    document.getElementById('square-grid-lineWeight').value = preset.lineWeight;
    document.getElementById('square-grid-marginTop').value    = margins[0];
    document.getElementById('square-grid-marginRight').value  = margins[1];
    document.getElementById('square-grid-marginBottom').value = margins[2];
    document.getElementById('square-grid-marginLeft').value   = margins[3];
    document.getElementById('square-grid-majorInterval').value = preset.majorInterval ?? 0;
    document.getElementById('square-grid-majorWeight').value   = preset.majorWeight ?? 0.5;
    document.getElementById('square-grid-majorOpacity').value  = preset.majorOpacity ?? 0.7;
    const majorIntervalVal = parseInt(preset.majorInterval ?? 0);
    document.getElementById('square-grid-majorWeight-field').style.display = majorIntervalVal > 0 ? '' : 'none';
    document.getElementById('square-grid-majorOpacity-field').style.display = majorIntervalVal > 0 ? '' : 'none';
  } else if (type === 'isometric') {
    document.getElementById('isometric-spacing').value    = preset.spacing;
    document.getElementById('isometric-lineWeight').value = preset.lineWeight;
    document.getElementById('isometric-marginTop').value    = margins[0];
    document.getElementById('isometric-marginRight').value  = margins[1];
    document.getElementById('isometric-marginBottom').value = margins[2];
    document.getElementById('isometric-marginLeft').value   = margins[3];
  } else if (type === 'cornell') {
    document.getElementById('cornell-cueWidth').value       = preset.cueWidth;
    document.getElementById('cornell-summaryHeight').value  = preset.summaryHeight;
    document.getElementById('cornell-lineSpacing').value    = preset.lineSpacing;
    document.getElementById('cornell-lineWeight').value     = preset.lineWeight;
    document.getElementById('cornell-dividerWeight').value  = preset.dividerWeight;
    document.getElementById('cornell-marginTop').value    = margins[0];
    document.getElementById('cornell-marginRight').value  = margins[1];
    document.getElementById('cornell-marginBottom').value = margins[2];
    document.getElementById('cornell-marginLeft').value   = margins[3];
  }
}

/* ── updatePreview ── renders canvas with correct aspect ratio ── */
function updatePreview() {
  const config = getConfig();
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');

  const canvasWidth = 340;
  const canvasHeight = Math.round(canvasWidth * (config.paperH / config.paperW));
  canvas.width  = canvasWidth;
  canvas.height = canvasHeight;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  const scale = canvasWidth / config.paperW;
  const previewConfig = { ...config, canvasWidth, canvasHeight, scale };

  if (config.type === 'dot-grid')    previewDotGrid(ctx, previewConfig);
  else if (config.type === 'ruled')       previewRuled(ctx, previewConfig);
  else if (config.type === 'square-grid') previewSquareGrid(ctx, previewConfig);
  else if (config.type === 'isometric')   previewIsometric(ctx, previewConfig);
  else if (config.type === 'cornell')     previewCornell(ctx, previewConfig);
}

/* ── generatePDF ── full async pipeline ── */
async function generatePDF() {
  const generateBtn       = document.getElementById('generateBtn');
  const progressContainer = document.getElementById('progressContainer');
  const progressFill      = document.getElementById('progressFill');
  const statusText        = document.getElementById('statusText');

  generateBtn.disabled = true;
  progressContainer.classList.remove('hidden');
  statusText.textContent = 'Preparing...';
  statusText.className   = 'status-text';
  progressFill.style.width = '0%';

  try {
    const config = getConfig();

    // Validate margins
    if (config.marginTop + config.marginBottom >= config.paperH) {
      alert('Top + Bottom margins exceed page height. Please reduce them.');
      return;
    }
    if (config.marginLeft + config.marginRight >= config.paperW) {
      alert('Left + Right margins exceed page width. Please reduce them.');
      return;
    }

    // Validate page count
    const pageCount = config.pageCount;
    if (isNaN(pageCount) || pageCount < 1 || pageCount > 200) {
      alert('Page count must be between 1 and 200.');
      return;
    }

    // Validate spacing
    const checkSpacing = config.type === 'cornell' ? config.lineSpacing : config.spacing;
    if (checkSpacing / MM < 3) {
      alert('Spacing must be at least 3mm.');
      return;
    }

    const pdfDoc = await PDFDocument.create();

    for (let i = 0; i < pageCount; i++) {
      const page = pdfDoc.addPage([config.paperW, config.paperH]);

      if (config.type === 'dot-grid')         drawDotGrid(page, config);
      else if (config.type === 'ruled')        drawRuled(page, config);
      else if (config.type === 'square-grid')  drawSquareGrid(page, config);
      else if (config.type === 'isometric')    drawIsometric(page, config);
      else if (config.type === 'cornell')      drawCornell(page, config);

      progressFill.style.width = `${((i + 1) / pageCount * 100).toFixed(0)}%`;
      statusText.textContent   = `Processing page ${i + 1} of ${pageCount}...`;

      await new Promise(r => setTimeout(r, 0));
    }

    statusText.textContent = 'Saving PDF...';
    const bytes = await pdfDoc.save();

    const filename = `${config.type}-${config.paperSizeKey}-${pageCount}p.pdf`;
    downloadBlob(bytes, filename, 'application/pdf');

    statusText.textContent = `Done! ${pageCount} page${pageCount > 1 ? 's' : ''} generated.`;
    statusText.className   = 'status-text done';

  } catch (err) {
    statusText.textContent = 'Error: ' + err.message;
    statusText.className   = 'status-text error';
    console.error(err);
  } finally {
    generateBtn.disabled = false;
  }
}

/* downloadBlob — fully implemented */
function downloadBlob(bytes, filename, mime) {
  const blob = new Blob([bytes], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* ── Event wiring (T7) ── */
document.addEventListener('DOMContentLoaded', () => {
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      const type = tab.dataset.type;
      document.getElementById('panel-' + type).classList.add('active');
      loadPreset(type);
      updatePreview();
    });
  });

  // Paper size toggle
  document.querySelectorAll('.paper-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.paper-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const activeType = document.querySelector('.tab.active').dataset.type;
      if (activeType === 'cornell') loadPreset('cornell');
      updatePreview();
    });
  });

  // Color swatch selection
  document.querySelectorAll('.swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      updatePreview();
    });
  });

  // Opacity slider — update label + debounced preview
  let previewTimer;
  const opacitySlider = document.getElementById('opacitySlider');
  const opacityLabel  = document.getElementById('opacityLabel');
  opacitySlider.addEventListener('input', () => {
    opacityLabel.textContent = parseFloat(opacitySlider.value).toFixed(2);
    clearTimeout(previewTimer);
    previewTimer = setTimeout(updatePreview, 100);
  });

  // All number inputs — debounced preview
  document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('input', () => {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(updatePreview, 100);
    });
  });

  // Major interval show/hide
  document.getElementById('square-grid-majorInterval').addEventListener('input', () => {
    const val = parseInt(document.getElementById('square-grid-majorInterval').value) || 0;
    document.getElementById('square-grid-majorWeight-field').style.display = val > 0 ? '' : 'none';
    document.getElementById('square-grid-majorOpacity-field').style.display = val > 0 ? '' : 'none';
  });

  // Dot shape change
  document.getElementById('dot-grid-shape').addEventListener('change', () => {
    updatePreview();
  });

  document.getElementById('ruled-marginLine').addEventListener('change', () => {
    const checked = document.getElementById('ruled-marginLine').checked;
    document.getElementById('ruled-marginLine-controls').style.display = checked ? '' : 'none';
    updatePreview();
  });

  document.querySelectorAll('.margin-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      document.querySelectorAll('.margin-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      updatePreview();
    });
  });

  // Generate button
  document.getElementById('generateBtn').addEventListener('click', generatePDF);

  // Initialize: Dot Grid tab active, load preset, render preview
  loadPreset('dot-grid');
  updatePreview();
});
</script>
