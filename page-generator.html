<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text: #eee;
    --text-dim: #aaa;
    --border: #2a2a4a;
    --success: #2ecc71;
    --warning: #f39c12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--text-dim);
    margin-top: 4px;
    font-size: 14px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 12px 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .tab:hover:not(.active) {
    background: rgba(233, 69, 96, 0.1);
    color: var(--text);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .panel h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* Config grid */
  .config {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 12px;
    color: var(--text-dim);
  }

  .field input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 14px;
    width: 100%;
  }

  .field input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  @media (max-width: 640px) {
    .config { grid-template-columns: 1fr; }
  }

  /* Paper size toggle */
  .paper-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .paper-btn {
    padding: 8px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .paper-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Color swatches */
  .color-palette {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }

  .swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  .swatch:hover {
    transform: scale(1.15);
  }

  /* Range slider */
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  /* Preview */
  .preview-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
  }

  #previewCanvas {
    border: 1px solid var(--border);
    background: white;
    max-width: 100%;
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.2s;
  }

  .status-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
  }

  .status-text.done { color: var(--success); }
  .status-text.error { color: var(--accent); }
  .hidden { display: none !important; }

  .margin-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .margin-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .margin-swatch:hover {
    transform: scale(1.15);
  }
  .checkbox-field {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .checkbox-field label {
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  .margin-palette {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 4px;
  }

  /* Global controls row */
  .global-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .global-controls .paper-toggle {
    margin-bottom: 0;
  }
  .unit-label-tag {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-right: 2px;
  }

  /* Hex diagram */
  .hex-diagram-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 4px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .hex-diagram-wrap canvas {
    display: block;
  }
  .hex-dims {
    display: flex;
    gap: 16px;
    justify-content: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .hex-dims strong {
    color: var(--text);
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Page Generator</h1>
    <p>Generate printable pages with dot-grid, ruled, square grid, isometric, hex grid, and Cornell notes patterns.</p>
  </header>

  <!-- Page type tabs -->
  <div class="tabs">
    <button class="tab active" data-type="dot-grid">Dot Grid</button>
    <button class="tab" data-type="ruled">Ruled</button>
    <button class="tab" data-type="square-grid">Square Grid</button>
    <button class="tab" data-type="isometric">Isometric</button>
    <button class="tab" data-type="cornell">Cornell Notes</button>
    <button class="tab" data-type="hex-grid">Hex Grid</button>
  </div>

  <!-- Dot Grid Panel -->
  <div class="tab-content active" id="panel-dot-grid">
    <div class="panel">
      <h3>Dot Grid Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="dot-grid-spacing" min="3" max="20" step="0.5" value="5">
        </div>
        <div class="field">
          <label>Dot Size (mm)</label>
          <input type="number" id="dot-grid-dotSize" min="0.3" max="3" step="0.1" value="0.8">
        </div>
        <div class="field">
          <label>Dot Shape</label>
          <select id="dot-grid-shape" style="background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%;">
            <option value="circle">Circle (●)</option>
            <option value="cross">Cross (+)</option>
            <option value="x">X (×)</option>
            <option value="square">Square (■)</option>
          </select>
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="dot-grid-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="dot-grid-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="dot-grid-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="dot-grid-marginLeft" min="0" max="50" step="1" value="15">
        </div>
      </div>
    </div>
  </div>

  <!-- Ruled Panel -->
  <div class="tab-content" id="panel-ruled">
    <div class="panel">
      <h3>Ruled Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="ruled-spacing" min="3" max="20" step="0.5" value="7">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="ruled-lineWeight" min="0.1" max="2" step="0.1" value="0.3">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="ruled-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="ruled-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="ruled-marginBottom" min="0" max="50" step="1" value="25">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
            <input type="number" id="ruled-marginLeft" min="0" max="50" step="1" value="15">
          </div>
      </div>
      <!-- Margin line controls -->
      <div class="checkbox-field" style="margin-top: 12px;">
        <input type="checkbox" id="ruled-marginLine">
        <label for="ruled-marginLine">Show margin line</label>
      </div>
      <div id="ruled-marginLine-controls" style="display:none; margin-top: 8px;">
        <div class="margin-palette">
          <button class="margin-swatch active" data-margin-rgb="0.89,0.27,0.27" style="background:#E24444" title="Red"></button>
          <button class="margin-swatch" data-margin-rgb="0.27,0.47,0.80" style="background:#4477CC" title="Blue"></button>
          <button class="margin-swatch" data-margin-rgb="0.20,0.20,0.20" style="background:#333333" title="Black"></button>
          <button class="margin-swatch" data-margin-rgb="0.60,0.60,0.60" style="background:#999999" title="Gray"></button>
        </div>
        <div class="config" style="margin-top: 8px; margin-bottom: 0;">
          <div class="field">
            <label>Margin Line Weight (mm)</label>
            <input type="number" id="ruled-marginLineWeight" min="0.2" max="3" step="0.1" value="0.5">
          </div>
          <div class="field">
            <label>Margin Line Position (mm)</label>
            <input type="number" id="ruled-marginLinePosition" min="5" max="100" step="1" value="15">
          </div>
        </div>
       </div>
       <!-- Header line controls -->
       <div class="checkbox-field" style="margin-top: 8px;">
         <input type="checkbox" id="ruled-headerLine">
         <label for="ruled-headerLine">Thicker first line</label>
       </div>
       <div id="ruled-headerLine-controls" style="display:none; margin-top: 8px;">
         <div class="config" style="margin-bottom: 0;">
           <div class="field">
             <label>Header Line Weight (mm)</label>
             <input type="number" id="ruled-headerLineWeight" min="0.3" max="4" step="0.1" value="0.6">
           </div>
         </div>
        </div>
      </div>
      <!-- Midline controls -->
      <div class="checkbox-field" style="margin-top: 8px;">
        <input type="checkbox" id="ruled-midlines">
        <label for="ruled-midlines">Show midline guides</label>
      </div>
    </div>

    <!-- Square Grid Panel -->
  <div class="tab-content" id="panel-square-grid">
    <div class="panel">
      <h3>Square Grid Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="square-grid-spacing" min="3" max="20" step="0.5" value="5">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="square-grid-lineWeight" min="0.1" max="2" step="0.1" value="0.25">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="square-grid-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="square-grid-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="square-grid-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="square-grid-marginLeft" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Major Line Every (N)</label>
          <input type="number" id="square-grid-majorInterval" min="0" max="20" step="1" value="0">
        </div>
        <div class="field" id="square-grid-majorWeight-field" style="display:none">
          <label>Major Line Weight (mm)</label>
          <input type="number" id="square-grid-majorWeight" min="0.2" max="4" step="0.1" value="0.5">
        </div>
        <div class="field" id="square-grid-majorOpacity-field" style="display:none">
          <label>Major Line Opacity</label>
          <input type="number" id="square-grid-majorOpacity" min="0.1" max="1" step="0.05" value="0.7">
        </div>
      </div>
    </div>
  </div>

  <!-- Isometric Panel -->
  <div class="tab-content" id="panel-isometric">
    <div class="panel">
      <h3>Isometric Settings</h3>
      <div class="config">
        <div class="field">
          <label>Spacing (mm)</label>
          <input type="number" id="isometric-spacing" min="3" max="20" step="0.5" value="7">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="isometric-lineWeight" min="0.1" max="2" step="0.1" value="0.25">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="isometric-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="isometric-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="isometric-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="isometric-marginLeft" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Mode</label>
          <select id="isometric-mode" style="background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%;">
            <option value="lines" selected>Lines</option>
            <option value="dots">Dots</option>
          </select>
        </div>
        <div class="field" id="isometric-dotSize-field" style="display:none">
          <label>Dot Size (mm)</label>
          <input type="number" id="isometric-dotSize" min="0.3" max="3" step="0.1" value="0.8">
        </div>
      </div>
    </div>
  </div>

  <!-- Cornell Panel -->
  <div class="tab-content" id="panel-cornell">
    <div class="panel">
      <h3>Cornell Notes Settings</h3>
      <div class="config">
        <div class="field" style="grid-column: 1 / -1;">
          <label>Fill Pattern</label>
          <select id="cornell-fillPattern" style="background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%;">
            <option value="ruled" selected>Ruled Lines</option>
            <option value="dot-grid">Dot Grid</option>
            <option value="square-grid">Square Grid</option>
            <option value="blank">Blank</option>
          </select>
        </div>
        <div class="field" id="cornell-dotSize-field" style="display:none">
          <label>Dot Size (mm)</label>
          <input type="number" id="cornell-dotSize" min="0.3" max="3" step="0.1" value="0.8">
        </div>
        <div class="field" id="cornell-gridWeight-field" style="display:none">
          <label>Grid Line Weight (mm)</label>
          <input type="number" id="cornell-gridWeight" min="0.1" max="2" step="0.1" value="0.25">
        </div>
        <div class="field">
          <label>Cue Width (mm)</label>
          <input type="number" id="cornell-cueWidth" min="30" max="100" step="1" value="63.5">
        </div>
        <div class="field">
          <label>Summary Height (mm)</label>
          <input type="number" id="cornell-summaryHeight" min="20" max="80" step="1" value="50.8">
        </div>
        <div class="field">
          <label>Line Spacing (mm)</label>
          <input type="number" id="cornell-lineSpacing" min="3" max="20" step="0.5" value="7">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="cornell-lineWeight" min="0.1" max="2" step="0.1" value="0.3">
        </div>
        <div class="field">
          <label>Divider Weight (mm)</label>
          <input type="number" id="cornell-dividerWeight" min="0.3" max="3" step="0.1" value="0.8">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="cornell-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="cornell-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="cornell-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="cornell-marginLeft" min="0" max="50" step="1" value="15">
        </div>
      </div>
    </div>
  </div>

  <!-- Hex Grid Panel -->
  <div class="tab-content" id="panel-hex-grid">
    <div class="panel">
      <h3>Hex Grid Settings</h3>
      <div class="hex-diagram-wrap">
        <canvas id="hexDiagramCanvas" width="220" height="150"></canvas>
        <div class="hex-dims" id="hexDims"></div>
      </div>
      <div class="config">
        <div class="field">
          <label>Sizing</label>
          <select id="hex-grid-sizing" style="background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%;">
            <option value="side" selected>Side Length</option>
            <option value="flat-to-flat">Flat-to-Flat Diameter</option>
            <option value="point-to-point">Point-to-Point Diameter</option>
          </select>
        </div>
        <div class="field">
          <label id="hex-grid-spacing-label">Side Length (mm)</label>
          <input type="number" id="hex-grid-spacing" min="3" max="20" step="0.5" value="7">
        </div>
        <div class="field">
          <label>Line Weight (mm)</label>
          <input type="number" id="hex-grid-lineWeight" min="0.1" max="2" step="0.1" value="0.25">
        </div>
        <div class="field">
          <label>Margin Top (mm)</label>
          <input type="number" id="hex-grid-marginTop" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Right (mm)</label>
          <input type="number" id="hex-grid-marginRight" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Bottom (mm)</label>
          <input type="number" id="hex-grid-marginBottom" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Margin Left (mm)</label>
          <input type="number" id="hex-grid-marginLeft" min="0" max="50" step="1" value="15">
        </div>
        <div class="field">
          <label>Orientation</label>
          <select id="hex-grid-orientation" style="background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%;">
            <option value="flat-top" selected>Flat Top</option>
            <option value="pointy-top">Pointy Top</option>
          </select>
        </div>
        <div class="field">
          <label>Mode</label>
          <select id="hex-grid-mode" style="background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%;">
            <option value="lines" selected>Lines</option>
            <option value="dots">Dots</option>
          </select>
        </div>
        <div class="field" id="hex-grid-dotSize-field" style="display:none">
          <label>Dot Size (mm)</label>

<script>
const MM = 2.8346;
const PAPER_SIZES = {
  letter: { name: 'Letter', w: 612, h: 792 },
  a4:     { name: 'A4', w: 595.28, h: 841.89 }
};
const COLORS = [
  { name: 'Light Gray', rgb: [0.75, 0.75, 0.75], hex: '#BFBFBF' },
  { name: 'Blue',       rgb: [0.60, 0.73, 0.89], hex: '#99BAE3' },
  { name: 'Green',      rgb: [0.60, 0.80, 0.60], hex: '#99CC99' },
  { name: 'Sepia',      rgb: [0.76, 0.64, 0.47], hex: '#C2A378' },
  { name: 'Black',      rgb: [0.00, 0.00, 0.00], hex: '#000000' },
];
const PRESETS = {
  'dot-grid':    { spacing: 5, dotSize: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.5, shape: 'circle' },
  'ruled':       { spacing: 7, lineWeight: 0.3, margins: [15,15,25,15], color: 0, opacity: 0.4, marginLine: false, marginLineColor: [0.89, 0.27, 0.27], marginLineWeight: 0.5, marginLinePosition: 15, headerLine: false, headerLineWeight: 0.6, midlines: false },
  'square-grid': { spacing: 5, lineWeight: 0.25, margins: [15,15,15,15], color: 0, opacity: 0.4, majorInterval: 0, majorWeight: 0.5, majorOpacity: 0.7 },
  'isometric':   { spacing: 7, lineWeight: 0.25, margins: [15,15,15,15], color: 0, opacity: 0.35, mode: 'lines', dotSize: 0.8 },
  'hex-grid':    { spacing: 7, lineWeight: 0.25, margins: [15,15,15,15], color: 0, opacity: 0.35, orientation: 'flat-top', mode: 'lines', dotSize: 0.8, hideIncomplete: false },
  'cornell': {
    letter: { cueWidth: 63.5, summaryHeight: 50.8, lineSpacing: 7, lineWeight: 0.3, dividerWeight: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.4, fillPattern: 'ruled', dotSize: 0.8, gridWeight: 0.25 },
    a4:     { cueWidth: 60,   summaryHeight: 48,   lineSpacing: 7, lineWeight: 0.3, dividerWeight: 0.8, margins: [15,15,15,15], color: 0, opacity: 0.4, fillPattern: 'ruled', dotSize: 0.8, gridWeight: 0.25 }
  }
};
const { PDFDocument, rgb } = PDFLib;
let currentUnit = 'mm';
let hexSizingMode = 'side';
const SQRT3 = Math.sqrt(3);

function hexInputToSide(val, mode) {
  if (mode === 'flat-to-flat') return val / SQRT3;
  if (mode === 'point-to-point') return val / 2;
  return val;
}

function sideToHexInput(sideLen, mode) {
  if (mode === 'flat-to-flat') return sideLen * SQRT3;
  if (mode === 'point-to-point') return sideLen * 2;
  return sideLen;
}

function unitFactor() {
  return currentUnit === 'mm' ? MM : 72;
}

function toggleUnit(newUnit) {
  if (newUnit === currentUnit) return;
  const toInches = newUnit === 'in';
  const factor = toInches ? 1 / 25.4 : 25.4;
  const decimals = toInches ? 3 : 2;

  document.querySelectorAll('.field').forEach(field => {
    const label = field.querySelector('label');
    const input = field.querySelector('input[type="number"]');
    if (!label || !input) return;
    const txt = label.textContent;
    if (!txt.includes('(mm)') && !txt.includes('(in)')) return;

    const raw = parseFloat(input.value);
    if (!isNaN(raw)) input.value = +(raw * factor).toFixed(decimals);

    ['min', 'max', 'step'].forEach(attr => {
      const v = parseFloat(input.getAttribute(attr));
      if (!isNaN(v)) input.setAttribute(attr, +(v * factor).toFixed(4));
    });

    label.textContent = txt.replace(
      toInches ? '(mm)' : '(in)',
      toInches ? '(in)' : '(mm)'
    );
  });

  currentUnit = newUnit;

  document.querySelectorAll('[data-unit]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.unit === newUnit);
  });

  updatePreview();
}


/* Draw functions */
function drawDotGrid(page, config) {
  const { paperW, paperH, spacing, dotSize, marginTop, marginRight, marginBottom, marginLeft, color, opacity, shape = 'circle' } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);
  const armLen = dotSize / 2;
  const thickness = dotSize * 0.25;

  for (let y = top; y >= bottom; y -= spacing) {
    for (let x = left; x <= right; x += spacing) {
      if (shape === 'circle') {
        page.drawCircle({ x, y, size: dotSize, color: c, opacity });
      } else if (shape === 'cross') {
        page.drawLine({ start: { x: x - armLen, y }, end: { x: x + armLen, y }, thickness, color: c, opacity });
        page.drawLine({ start: { x, y: y - armLen }, end: { x, y: y + armLen }, thickness, color: c, opacity });
      } else if (shape === 'x') {
        const d = armLen * Math.SQRT1_2;
        page.drawLine({ start: { x: x - d, y: y - d }, end: { x: x + d, y: y + d }, thickness, color: c, opacity });
        page.drawLine({ start: { x: x - d, y: y + d }, end: { x: x + d, y: y - d }, thickness, color: c, opacity });
      } else if (shape === 'square') {
        page.drawRectangle({ x: x - dotSize / 2, y: y - dotSize / 2, width: dotSize, height: dotSize, color: c, opacity });
      }
    }
  }
}
function drawRuled(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity,
          marginLine = false, marginLineColor, marginLineWeight, marginLinePosition,
          headerLine = false, headerLineWeight,
          midlines = false } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const midlineOpacity = Math.max(0.05, opacity / 2);

  let lineIdx = 0;
  for (let y = top; y >= bottom; y -= spacing) {
    const isHeader = headerLine && lineIdx === 0;
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: isHeader ? headerLineWeight : lineWeight,
      color: rgb(r, g, b),
      opacity
    });

    if (midlines) {
      const midY = y - spacing / 2;
      if (midY >= bottom) {
        page.drawLine({
          start: { x: left, y: midY },
          end: { x: right, y: midY },
          thickness: lineWeight,
          color: rgb(r, g, b),
          opacity: midlineOpacity
        });
      }
    }

    lineIdx++;
  }

  if (marginLine && marginLineColor && marginLineWeight && marginLinePosition) {
    const [mr, mg, mb] = marginLineColor;
    page.drawLine({
      start: { x: marginLinePosition, y: bottom },
      end: { x: marginLinePosition, y: top },
      thickness: marginLineWeight,
      color: rgb(mr, mg, mb),
      opacity: 1.0
    });
  }
}
function drawSquareGrid(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity,
          majorInterval = 0, majorWeight, majorOpacity } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  // Horizontal lines
  let hIdx = 0;
  for (let y = top; y >= bottom; y -= spacing) {
    const isMajor = majorInterval > 0 && hIdx % majorInterval === 0;
    page.drawLine({
      start: { x: left, y },
      end: { x: right, y },
      thickness: isMajor ? majorWeight : lineWeight,
      color: c,
      opacity: isMajor ? majorOpacity : opacity
    });
    hIdx++;
  }

  // Vertical lines
  let vIdx = 0;
  for (let x = left; x <= right; x += spacing) {
    const isMajor = majorInterval > 0 && vIdx % majorInterval === 0;
    page.drawLine({
      start: { x, y: bottom },
      end: { x, y: top },
      thickness: isMajor ? majorWeight : lineWeight,
      color: c,
      opacity: isMajor ? majorOpacity : opacity
    });
    vIdx++;
  }
}
function drawIsometric(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity,
          mode = 'lines', dotSize = 0.8 * 2.8346 } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  if (mode === 'lines') {
    const S3 = Math.sqrt(3);
    const verticalGap = spacing * S3 / 2;
    const diagHeight = top - bottom;
    const diagWidth = right - left;
    const farDist = diagWidth + diagHeight;

    function clipLine(x1, y1, x2, y2) {
      let tMin = 0, tMax = 1;
      const dx = x2 - x1, dy = y2 - y1;
      function clip(p, q) {
        if (p === 0) return q >= 0;
        const t = q / p;
        if (p < 0) { if (t > tMax) return false; if (t > tMin) tMin = t; }
        else { if (t < tMin) return false; if (t < tMax) tMax = t; }
        return true;
      }
      if (!clip(-dx, x1 - left)) return null;
      if (!clip(dx, right - x1)) return null;
      if (!clip(-dy, y1 - bottom)) return null;
      if (!clip(dy, top - y1)) return null;
      return [x1 + tMin * dx, y1 + tMin * dy, x1 + tMax * dx, y1 + tMax * dy];
    }

    function drawClipped(x1, y1, x2, y2) {
      const clipped = clipLine(x1, y1, x2, y2);
      if (!clipped) return;
      const [cx1, cy1, cx2, cy2] = clipped;
      page.drawLine({ start: { x: cx1, y: cy1 }, end: { x: cx2, y: cy2 }, thickness: lineWeight, color: c, opacity });
    }

    // 1. Horizontal lines at verticalGap intervals from top down to bottom
    for (let y = top; y >= bottom; y -= verticalGap) {
      drawClipped(left, y, right, y);
    }

    // 2. +60° lines and -60° lines
    for (let x0 = left - diagHeight / S3; x0 <= right; x0 += spacing) {
      drawClipped(x0 - farDist, bottom - farDist * S3, x0 + farDist, bottom + farDist * S3);
      drawClipped(x0 - farDist, top + farDist * S3, x0 + farDist, top - farDist * S3);
    }
  } else if (mode === 'dots') {
    // Triangular lattice: even rows at x = left + n*spacing, odd rows offset by spacing/2
    // verticalGap = spacing * sqrt(3) / 2
    const S3 = Math.sqrt(3);
    const verticalGap = spacing * S3 / 2;

    let rowIdx = 0;
    for (let y = top; y >= bottom; y -= verticalGap) {
      const xOffset = (rowIdx % 2 === 0) ? 0 : spacing / 2;
      for (let x = left + xOffset; x <= right; x += spacing) {
        page.drawCircle({ x, y, size: dotSize, color: c, opacity });
      }
      rowIdx++;
    }
  }
}
function drawHexGrid(page, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity,
          orientation = 'flat-top', mode = 'lines', dotSize = 0.8 * 2.8346, hideIncomplete = false } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const bottom = marginBottom;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);
  const R = spacing;

  if (mode === 'lines') {
    function clipLine(x1, y1, x2, y2) {
      let tMin = 0, tMax = 1;
      const dx = x2 - x1, dy = y2 - y1;
      function clip(p, q) {
        if (p === 0) return q >= 0;
        const t = q / p;
        if (p < 0) { if (t > tMax) return false; if (t > tMin) tMin = t; }
        else { if (t < tMin) return false; if (t < tMax) tMax = t; }
        return true;
      }
      if (!clip(-dx, x1 - left)) return null;
      if (!clip(dx, right - x1)) return null;
      if (!clip(-dy, y1 - bottom)) return null;
      if (!clip(dy, top - y1)) return null;
      return [x1 + tMin * dx, y1 + tMin * dy, x1 + tMax * dx, y1 + tMax * dy];
    }

    function drawClipped(x1, y1, x2, y2) {
      const clipped = clipLine(x1, y1, x2, y2);
      if (!clipped) return;
      const [cx1, cy1, cx2, cy2] = clipped;
      page.drawLine({ start: { x: cx1, y: cy1 }, end: { x: cx2, y: cy2 }, thickness: lineWeight, color: c, opacity });
    }

    if (orientation === 'flat-top') {
      const colStep = 1.5 * R;
      const rowStep = Math.sqrt(3) * R;
      let colIdx = 0;
      for (let cx = left - 2 * R; cx <= right + 2 * R; cx += colStep, colIdx++) {
        const yOffset = (colIdx % 2 === 1) ? rowStep / 2 : 0;
        for (let cy = bottom - 2 * R + yOffset; cy <= top + 2 * R; cy += rowStep) {
          if (hideIncomplete && (cx < left || cx > right || cy < bottom || cy > top)) continue;
          for (let k = 0; k < 6; k++) {
            const vx1 = cx + R * Math.cos(k * Math.PI / 3);
            const vy1 = cy + R * Math.sin(k * Math.PI / 3);
            const vx2 = cx + R * Math.cos((k + 1) * Math.PI / 3);
            const vy2 = cy + R * Math.sin((k + 1) * Math.PI / 3);
            drawClipped(vx1, vy1, vx2, vy2);
          }
        }
      }
    } else {
      const rowStep = 1.5 * R;
      const colStep = Math.sqrt(3) * R;
      let rowIdx = 0;
      for (let cy = bottom - 2 * R; cy <= top + 2 * R; cy += rowStep, rowIdx++) {
        const xOffset = (rowIdx % 2 === 1) ? colStep / 2 : 0;
        for (let cx = left - 2 * R + xOffset; cx <= right + 2 * R; cx += colStep) {
          if (hideIncomplete && (cx < left || cx > right || cy < bottom || cy > top)) continue;
          for (let k = 0; k < 6; k++) {
            const vx1 = cx + R * Math.cos(Math.PI / 6 + k * Math.PI / 3);
            const vy1 = cy + R * Math.sin(Math.PI / 6 + k * Math.PI / 3);
            const vx2 = cx + R * Math.cos(Math.PI / 6 + (k + 1) * Math.PI / 3);
            const vy2 = cy + R * Math.sin(Math.PI / 6 + (k + 1) * Math.PI / 3);
            drawClipped(vx1, vy1, vx2, vy2);
          }
        }
      }
    }
  } else if (mode === 'dots') {
    const S3 = Math.sqrt(3);
    if (orientation === 'flat-top') {
      const verticalGap = R * S3 / 2;
      let rowIdx = 0;
      for (let y = top; y >= bottom; y -= verticalGap) {
        const xOffset = (rowIdx % 2 === 0) ? 0 : R / 2;
        for (let x = left + xOffset; x <= right; x += R) {
          page.drawCircle({ x, y, size: dotSize, color: c, opacity });
        }
        rowIdx++;
      }
    } else {
      const horizontalGap = S3 * R / 2;
      let colIdx = 0;
      for (let x = left; x <= right; x += horizontalGap, colIdx++) {
        const yOffset = (colIdx % 2 === 1) ? R / 2 : 0;
        for (let y = bottom + yOffset; y <= top; y += R) {
          page.drawCircle({ x, y, size: dotSize, color: c, opacity });
        }
      }
    }
  }
}
function drawCornell(page, config) {
  const { paperW, paperH, cueWidth, summaryHeight, lineSpacing, lineWeight, dividerWeight,
          marginTop, marginRight, marginBottom, marginLeft, color, opacity,
          fillPattern = 'ruled', dotSize, gridWeight } = config;
  const left = marginLeft;
  const right = paperW - marginRight;
  const top = paperH - marginTop;
  const [r, g, b] = color;
  const c = rgb(r, g, b);

  const cueX = left + cueWidth;
  const summaryY = marginBottom + summaryHeight;

  // 1. Vertical cue divider (always drawn)
  page.drawLine({
    start: { x: cueX, y: summaryY },
    end: { x: cueX, y: top },
    thickness: dividerWeight,
    color: c,
    opacity
  });

  // 2. Summary horizontal divider (always drawn)
  page.drawLine({
    start: { x: left, y: summaryY },
    end: { x: right, y: summaryY },
    thickness: dividerWeight,
    color: c,
    opacity
  });

  // 3. Fill dispatch (full width, from top down to marginBottom)
  if (fillPattern === 'ruled') {
    for (let y = top; y >= marginBottom; y -= lineSpacing) {
      page.drawLine({
        start: { x: left, y },
        end: { x: right, y },
        thickness: lineWeight,
        color: c,
        opacity
      });
    }
  } else if (fillPattern === 'dot-grid') {
    for (let y = top; y >= marginBottom; y -= lineSpacing) {
      for (let x = left; x <= right; x += lineSpacing) {
        page.drawCircle({ x, y, size: dotSize, color: c, opacity });
      }
    }
  } else if (fillPattern === 'square-grid') {
    // Horizontal lines
    for (let y = top; y >= marginBottom; y -= lineSpacing) {
      page.drawLine({
        start: { x: left, y },
        end: { x: right, y },
        thickness: gridWeight,
        color: c,
        opacity
      });
    }
    // Vertical lines
    for (let x = left; x <= right; x += lineSpacing) {
      page.drawLine({
        start: { x, y: marginBottom },
        end: { x, y: top },
        thickness: gridWeight,
        color: c,
        opacity
      });
    }
  }
  // 'blank': only dividers, no fill
}

/* Preview functions */
function previewDotGrid(ctx, config) {
  const { paperW, paperH, spacing, dotSize, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasWidth, canvasHeight, scale, shape = 'circle' } = config;
  const radius = (dotSize / 2) * scale;
  const [r, g, b] = color;
  const rgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  const armLen = radius;
  const lineWidth = radius * 0.5;

  ctx.fillStyle = rgba;
  ctx.strokeStyle = rgba;

  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += spacing) {
      const cx = pdfX * scale;
      if (shape === 'circle') {
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
      } else if (shape === 'cross') {
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(cx - armLen, cy);
        ctx.lineTo(cx + armLen, cy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, cy - armLen);
        ctx.lineTo(cx, cy + armLen);
        ctx.stroke();
      } else if (shape === 'x') {
        const d = armLen * Math.SQRT1_2;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(cx - d, cy - d);
        ctx.lineTo(cx + d, cy + d);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx - d, cy + d);
        ctx.lineTo(cx + d, cy - d);
        ctx.stroke();
      } else if (shape === 'square') {
        ctx.fillRect(cx - radius, cy - radius, dotSize * scale, dotSize * scale);
      }
    }
  }
}
function previewRuled(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale,
          marginLine = false, marginLineColor, marginLineWeight, marginLinePosition,
          headerLine = false, headerLineWeight,
          midlines = false } = config;
  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const [r, g, b] = color;
  const midlineOpacity = Math.max(0.05, opacity / 2);

  let lineIdx = 0;
  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    const isHeader = headerLine && lineIdx === 0;
    ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
    ctx.lineWidth = (isHeader ? headerLineWeight : lineWeight) * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();

    if (midlines) {
      const midPdfY = pdfY - spacing / 2;
      if (midPdfY >= marginBottom) {
        const midCy = canvasHeight - midPdfY * scale;
        ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${midlineOpacity})`;
        ctx.lineWidth = lineWeight * scale;
        ctx.beginPath();
        ctx.moveTo(left, midCy);
        ctx.lineTo(right, midCy);
        ctx.stroke();
      }
    }

    lineIdx++;
  }

  if (marginLine && marginLineColor && marginLineWeight && marginLinePosition) {
    const [mr, mg, mb] = marginLineColor;
    const cx = marginLinePosition * scale;
    const cTop = canvasHeight - (paperH - marginTop) * scale;
    const cBottom = canvasHeight - marginBottom * scale;
    ctx.strokeStyle = `rgba(${Math.round(mr * 255)}, ${Math.round(mg * 255)}, ${Math.round(mb * 255)}, 1.0)`;
    ctx.lineWidth = marginLineWeight * scale;
    ctx.beginPath();
    ctx.moveTo(cx, cTop);
    ctx.lineTo(cx, cBottom);
    ctx.stroke();
  }
}
function previewSquareGrid(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale,
          majorInterval = 0, majorWeight, majorOpacity } = config;
  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const bottom = marginBottom * scale;
  const top = (paperH - marginTop) * scale;
  const [r, g, b] = color;

  const baseRgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  const majorRgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${majorOpacity})`;

  // Horizontal lines (canvas Y inverted)
  let hIdx = 0;
  for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= spacing) {
    const cy = canvasHeight - pdfY * scale;
    const isMajor = majorInterval > 0 && hIdx % majorInterval === 0;
    ctx.strokeStyle = isMajor ? majorRgba : baseRgba;
    ctx.lineWidth = (isMajor ? majorWeight : lineWeight) * scale;
    ctx.beginPath();
    ctx.moveTo(left, cy);
    ctx.lineTo(right, cy);
    ctx.stroke();
    hIdx++;
  }

  // Vertical lines
  const canvasBottom = canvasHeight - bottom;
  const canvasTop = canvasHeight - top;
  let vIdx = 0;
  for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += spacing) {
    const cx = pdfX * scale;
    const isMajor = majorInterval > 0 && vIdx % majorInterval === 0;
    ctx.strokeStyle = isMajor ? majorRgba : baseRgba;
    ctx.lineWidth = (isMajor ? majorWeight : lineWeight) * scale;
    ctx.beginPath();
    ctx.moveTo(cx, canvasTop);
    ctx.lineTo(cx, canvasBottom);
    ctx.stroke();
    vIdx++;
  }
}
function previewIsometric(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale,
          mode = 'lines', dotSize = 0.8 * 2.8346 } = config;
  const [r, g, b] = color;

  // Canvas drawable area bounds (PDF top → small canvas y; PDF bottom → large canvas y)
  const cLeft = marginLeft * scale;
  const cRight = (paperW - marginRight) * scale;
  const cBottom = canvasHeight - marginBottom * scale;
  const cTop = canvasHeight - (paperH - marginTop) * scale;

  ctx.save();
  ctx.beginPath();
  ctx.rect(cLeft, cTop, cRight - cLeft, cBottom - cTop);
  ctx.clip();

  ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.lineWidth = lineWeight * scale;

  if (mode === 'lines') {
    const S3 = Math.sqrt(3);
    const vGap = spacing * S3 / 2 * scale;
    const spacingCanvas = spacing * scale;
    const diagHeight = cBottom - cTop;
    const diagWidth = cRight - cLeft;
    const farDist = (diagWidth + diagHeight) * 2;

    function drawLine(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    // 1. Horizontal lines: from cTop downward by vGap (canvas y increases downward)
    for (let cy = cTop; cy <= cBottom; cy += vGap) {
      drawLine(cLeft, cy, cRight, cy);
    }

    // 2. Diagonal lines
    for (let cx0 = cLeft - diagHeight / S3; cx0 <= cRight; cx0 += spacingCanvas) {
      drawLine(cx0 - farDist, cBottom + farDist * S3, cx0 + farDist, cBottom - farDist * S3);
      drawLine(cx0 - farDist, cTop - farDist * S3, cx0 + farDist, cTop + farDist * S3);
    }
  } else if (mode === 'dots') {
    // Triangular lattice in canvas coordinates
    const S3 = Math.sqrt(3);
    const vGap = spacing * S3 / 2 * scale;
    const spacingCanvas = spacing * scale;
    const dotRadius = (dotSize / 2) * scale;

    ctx.fillStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;

    let rowIdx = 0;
    for (let cy = cTop; cy <= cBottom; cy += vGap) {
      const xOffset = (rowIdx % 2 === 0) ? 0 : spacingCanvas / 2;
      for (let cx = cLeft + xOffset; cx <= cRight; cx += spacingCanvas) {
        ctx.beginPath();
        ctx.arc(cx, cy, dotRadius, 0, Math.PI * 2);
        ctx.fill();
      }
      rowIdx++;
    }
  }

  ctx.restore();
}
function previewHexGrid(ctx, config) {
  const { paperW, paperH, spacing, lineWeight, marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale,
          orientation = 'flat-top', mode = 'lines', dotSize = 0.8 * 2.8346, hideIncomplete = false } = config;
  const [r, g, b] = color;

  const cLeft = marginLeft * scale;
  const cRight = (paperW - marginRight) * scale;
  const cBottom = canvasHeight - marginBottom * scale;
  const cTop = canvasHeight - (paperH - marginTop) * scale;

  ctx.save();
  ctx.beginPath();
  ctx.rect(cLeft, cTop, cRight - cLeft, cBottom - cTop);
  ctx.clip();

  const R = spacing;
  const Rc = R * scale;

  if (mode === 'lines') {
    ctx.strokeStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
    ctx.lineWidth = lineWeight * scale;

    if (orientation === 'flat-top') {
      const colStep = 1.5 * Rc;
      const rowStep = Math.sqrt(3) * Rc;
      let colIdx = 0;
      for (let cx = cLeft - 2 * Rc; cx <= cRight + 2 * Rc; cx += colStep, colIdx++) {
        const yOffset = (colIdx % 2 === 1) ? rowStep / 2 : 0;
        for (let cy = cTop - 2 * Rc + yOffset; cy <= cBottom + 2 * Rc; cy += rowStep) {
          if (hideIncomplete && (cx < cLeft || cx > cRight || cy < cTop || cy > cBottom)) continue;
          ctx.beginPath();
          for (let k = 0; k < 6; k++) {
            const vx = cx + Rc * Math.cos(k * Math.PI / 3);
            const vy = cy + Rc * Math.sin(k * Math.PI / 3);
            if (k === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
          }
          ctx.closePath();
          ctx.stroke();
        }
      }
    } else {
      const rowStep = 1.5 * Rc;
      const colStep = Math.sqrt(3) * Rc;
      let rowIdx = 0;
      for (let cy = cTop - 2 * Rc; cy <= cBottom + 2 * Rc; cy += rowStep, rowIdx++) {
        const xOffset = (rowIdx % 2 === 1) ? colStep / 2 : 0;
        for (let cx = cLeft - 2 * Rc + xOffset; cx <= cRight + 2 * Rc; cx += colStep) {
          if (hideIncomplete && (cx < cLeft || cx > cRight || cy < cTop || cy > cBottom)) continue;
          ctx.beginPath();
          for (let k = 0; k < 6; k++) {
            const vx = cx + Rc * Math.cos(Math.PI / 6 + k * Math.PI / 3);
            const vy = cy + Rc * Math.sin(Math.PI / 6 + k * Math.PI / 3);
            if (k === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
          }
          ctx.closePath();
          ctx.stroke();
        }
      }
    }
  } else if (mode === 'dots') {
    const S3 = Math.sqrt(3);
    const dotRadius = dotSize / 2 * scale;
    ctx.fillStyle = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;

    if (orientation === 'flat-top') {
      const vGap = Rc * S3 / 2;
      let rowIdx = 0;
      for (let cy = cTop; cy <= cBottom; cy += vGap) {
        const xOffset = (rowIdx % 2 === 0) ? 0 : Rc / 2;
        for (let cx = cLeft + xOffset; cx <= cRight; cx += Rc) {
          ctx.beginPath();
          ctx.arc(cx, cy, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }
        rowIdx++;
      }
    } else {
      const horizontalGap = S3 * Rc / 2;
      let colIdx = 0;
      for (let cx = cLeft; cx <= cRight; cx += horizontalGap, colIdx++) {
        const yOffset = (colIdx % 2 === 1) ? Rc / 2 : 0;
        for (let cy = cTop + yOffset; cy <= cBottom; cy += Rc) {
          ctx.beginPath();
          ctx.arc(cx, cy, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  ctx.restore();
}
function previewCornell(ctx, config) {
  const { paperW, paperH, cueWidth, summaryHeight, lineSpacing, lineWeight, dividerWeight,
          marginTop, marginRight, marginBottom, marginLeft, color, opacity, canvasHeight, scale,
          fillPattern = 'ruled', dotSize, gridWeight } = config;
  const [r, g, b] = color;

  const left = marginLeft * scale;
  const right = (paperW - marginRight) * scale;
  const canvasTop = canvasHeight - (paperH - marginTop) * scale;
  const canvasBottom = canvasHeight - marginBottom * scale;

  const cueX = left + cueWidth * scale;
  const summaryY_pdf = marginBottom + summaryHeight;
  const summaryY = canvasHeight - summaryY_pdf * scale;

  const rgba = `rgba(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)}, ${opacity})`;
  ctx.strokeStyle = rgba;

  // 1. Vertical cue divider (always drawn)
  ctx.lineWidth = dividerWeight * scale;
  ctx.beginPath();
  ctx.moveTo(cueX, summaryY);
  ctx.lineTo(cueX, canvasTop);
  ctx.stroke();

  // 2. Summary horizontal divider (always drawn)
  ctx.lineWidth = dividerWeight * scale;
  ctx.beginPath();
  ctx.moveTo(left, summaryY);
  ctx.lineTo(right, summaryY);
  ctx.stroke();

  // 3. Fill dispatch
  if (fillPattern === 'ruled') {
    ctx.lineWidth = lineWeight * scale;
    for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= lineSpacing) {
      const cy = canvasHeight - pdfY * scale;
      ctx.beginPath();
      ctx.moveTo(left, cy);
      ctx.lineTo(right, cy);
      ctx.stroke();
    }
  } else if (fillPattern === 'dot-grid') {
    const dotRadius = (dotSize / 2) * scale;
    ctx.fillStyle = rgba;
    for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= lineSpacing) {
      const cy = canvasHeight - pdfY * scale;
      for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += lineSpacing) {
        const cx = pdfX * scale;
        ctx.beginPath();
        ctx.arc(cx, cy, dotRadius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (fillPattern === 'square-grid') {
    ctx.lineWidth = (gridWeight) * scale;
    // Horizontal lines
    for (let pdfY = (paperH - marginTop); pdfY >= marginBottom; pdfY -= lineSpacing) {
      const cy = canvasHeight - pdfY * scale;
      ctx.beginPath();
      ctx.moveTo(left, cy);
      ctx.lineTo(right, cy);
      ctx.stroke();
    }
    // Vertical lines
    for (let pdfX = marginLeft; pdfX <= (paperW - marginRight); pdfX += lineSpacing) {
      const cx = pdfX * scale;
      ctx.beginPath();
      ctx.moveTo(cx, canvasTop);
      ctx.lineTo(cx, canvasBottom);
      ctx.stroke();
    }
  }
  // 'blank': only dividers, no fill
}

/* ── getConfig ── reads form state, returns config with mm→pt conversion ── */
function getConfig() {
  const activeTab = document.querySelector('.tab.active');
  const type = activeTab.dataset.type;

  const paperSizeKey = document.querySelector('.paper-btn.active').dataset.size;
  const paper = PAPER_SIZES[paperSizeKey];

  const activeSwatch = document.querySelector('.swatch.active');
  const colorRgb = activeSwatch.dataset.rgb.split(',').map(Number);

  const opacity = parseFloat(document.getElementById('opacitySlider').value);
  const pageCount = parseInt(document.getElementById('pageCount').value, 10);

  const UF = unitFactor();
  let params = {};
  if (type === 'dot-grid') {
    params = {
      spacing:      parseFloat(document.getElementById('dot-grid-spacing').value)      * UF,
      dotSize:      parseFloat(document.getElementById('dot-grid-dotSize').value)      * UF,
      shape:        document.getElementById('dot-grid-shape').value,
      marginTop:    parseFloat(document.getElementById('dot-grid-marginTop').value)    * UF,
      marginRight:  parseFloat(document.getElementById('dot-grid-marginRight').value)  * UF,
      marginBottom: parseFloat(document.getElementById('dot-grid-marginBottom').value) * UF,
      marginLeft:   parseFloat(document.getElementById('dot-grid-marginLeft').value)   * UF,
    };
  } else if (type === 'ruled') {
    params = {
      spacing:      parseFloat(document.getElementById('ruled-spacing').value)      * UF,
      lineWeight:   parseFloat(document.getElementById('ruled-lineWeight').value)   * UF,
      marginTop:    parseFloat(document.getElementById('ruled-marginTop').value)    * UF,
      marginRight:  parseFloat(document.getElementById('ruled-marginRight').value)  * UF,
      marginBottom: parseFloat(document.getElementById('ruled-marginBottom').value) * UF,
      marginLeft:   parseFloat(document.getElementById('ruled-marginLeft').value)   * UF,
      marginLine:         document.getElementById('ruled-marginLine').checked,
      marginLineColor:    (() => {
        const active = document.querySelector('.margin-swatch.active');
        return active ? active.dataset.marginRgb.split(',').map(Number) : [0.89, 0.27, 0.27];
      })(),
      marginLineWeight:   parseFloat(document.getElementById('ruled-marginLineWeight').value) * UF,
       marginLinePosition: parseFloat(document.getElementById('ruled-marginLinePosition').value) * UF,
       headerLine:       document.getElementById('ruled-headerLine').checked,
       headerLineWeight: parseFloat(document.getElementById('ruled-headerLineWeight').value) * UF,
       midlines:         document.getElementById('ruled-midlines').checked,
     };
  } else if (type === 'square-grid') {
    params = {
      spacing:      parseFloat(document.getElementById('square-grid-spacing').value)      * UF,
      lineWeight:   parseFloat(document.getElementById('square-grid-lineWeight').value)   * UF,
      marginTop:    parseFloat(document.getElementById('square-grid-marginTop').value)    * UF,
      marginRight:  parseFloat(document.getElementById('square-grid-marginRight').value)  * UF,
      marginBottom: parseFloat(document.getElementById('square-grid-marginBottom').value) * UF,
      marginLeft:   parseFloat(document.getElementById('square-grid-marginLeft').value)   * UF,
      majorInterval: parseInt(document.getElementById('square-grid-majorInterval').value) || 0,
      majorWeight:   parseFloat(document.getElementById('square-grid-majorWeight').value)   * UF,
      majorOpacity:  parseFloat(document.getElementById('square-grid-majorOpacity').value),
    };
  } else if (type === 'isometric') {
    params = {
      spacing:      parseFloat(document.getElementById('isometric-spacing').value)      * UF,
      lineWeight:   parseFloat(document.getElementById('isometric-lineWeight').value)   * UF,
      marginTop:    parseFloat(document.getElementById('isometric-marginTop').value)    * UF,
      marginRight:  parseFloat(document.getElementById('isometric-marginRight').value)  * UF,
      marginBottom: parseFloat(document.getElementById('isometric-marginBottom').value) * UF,
      marginLeft:   parseFloat(document.getElementById('isometric-marginLeft').value)   * UF,
      mode:    document.getElementById('isometric-mode').value,
      dotSize: parseFloat(document.getElementById('isometric-dotSize').value) * UF,
    };
  } else if (type === 'hex-grid') {
    const hexRaw = parseFloat(document.getElementById('hex-grid-spacing').value);
    params = {
      spacing:      hexInputToSide(hexRaw, hexSizingMode) * UF,
      lineWeight:   parseFloat(document.getElementById('hex-grid-lineWeight').value)   * UF,
      marginTop:    parseFloat(document.getElementById('hex-grid-marginTop').value)    * UF,
      marginRight:  parseFloat(document.getElementById('hex-grid-marginRight').value)  * UF,
      marginBottom: parseFloat(document.getElementById('hex-grid-marginBottom').value) * UF,
      marginLeft:   parseFloat(document.getElementById('hex-grid-marginLeft').value)   * UF,
      orientation:  document.getElementById('hex-grid-orientation').value,
      mode:         document.getElementById('hex-grid-mode').value,
      dotSize:      parseFloat(document.getElementById('hex-grid-dotSize').value)      * UF,
      hideIncomplete: document.getElementById('hex-grid-hideIncomplete').checked,
    };
  } else if (type === 'cornell') {
    params = {
      cueWidth:       parseFloat(document.getElementById('cornell-cueWidth').value)       * UF,
      summaryHeight:  parseFloat(document.getElementById('cornell-summaryHeight').value)  * UF,
      lineSpacing:    parseFloat(document.getElementById('cornell-lineSpacing').value)    * UF,
      lineWeight:     parseFloat(document.getElementById('cornell-lineWeight').value)     * UF,
      dividerWeight:  parseFloat(document.getElementById('cornell-dividerWeight').value)  * UF,
      fillPattern: document.getElementById('cornell-fillPattern').value,
      dotSize:     parseFloat(document.getElementById('cornell-dotSize').value) * UF,
      gridWeight:  parseFloat(document.getElementById('cornell-gridWeight').value) * UF,
      marginTop:      parseFloat(document.getElementById('cornell-marginTop').value)      * UF,
      marginRight:    parseFloat(document.getElementById('cornell-marginRight').value)    * UF,
      marginBottom:   parseFloat(document.getElementById('cornell-marginBottom').value)   * UF,
      marginLeft:     parseFloat(document.getElementById('cornell-marginLeft').value)     * UF,
    };
  }

  return {
    type,
    paperW: paper.w,
    paperH: paper.h,
    paperName: paper.name,
    paperSizeKey,
    color: colorRgb,
    opacity,
    pageCount,
    ...params
  };
}

/* ── loadPreset ── populates form inputs from PRESETS ── */
function loadPreset(type) {
  let preset;
  if (type === 'cornell') {
    const sizeKey = document.querySelector('.paper-btn.active').dataset.size;
    preset = PRESETS.cornell[sizeKey];
  } else {
    preset = PRESETS[type];
  }
  if (!preset) return;

  // Color swatch
  document.querySelectorAll('.swatch').forEach((s, i) => {
    s.classList.toggle('active', i === preset.color);
  });

  // Opacity
  document.getElementById('opacitySlider').value = preset.opacity;
  document.getElementById('opacityLabel').textContent = preset.opacity.toFixed(2);

  const margins = preset.margins; // [top, right, bottom, left]

  if (type === 'dot-grid') {

    document.getElementById('isometric-spacing').value    = preset.spacing;

  }

  if (currentUnit === 'in') {
    const panel = document.getElementById('panel-' + type);

      panel.querySelectorAll('.field').forEach(field => {
        const label = field.querySelector('label');

        const v = parseFloat(input.value);
        if (!isNaN(v)) input.value = +(v / 25.4).toFixed(3);
      });
    }
  }
}

/* ── updatePreview ── renders canvas with correct aspect ratio ── */
function updatePreview() {
  const config = getConfig();
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');

  const canvasWidth = 340;
  const canvasHeight = Math.round(canvasWidth * (config.paperH / config.paperW));
  canvas.width  = canvasWidth;
  canvas.height = canvasHeight;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  const scale = canvasWidth / config.paperW;
  const previewConfig = { ...config, canvasWidth, canvasHeight, scale };

  if (config.type === 'dot-grid')    previewDotGrid(ctx, previewConfig);
  else if (config.type === 'ruled')       previewRuled(ctx, previewConfig);
  else if (config.type === 'square-grid') previewSquareGrid(ctx, previewConfig);
  else if (config.type === 'isometric')   previewIsometric(ctx, previewConfig);
  else if (config.type === 'hex-grid') {  previewHexGrid(ctx, previewConfig); updateHexDiagram(); }
  else if (config.type === 'cornell')     previewCornell(ctx, previewConfig);
}

function updateHexDiagram() {
  const canvas = document.getElementById('hexDiagramCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const orientation = document.getElementById('hex-grid-orientation').value;
  const inputVal = parseFloat(document.getElementById('hex-grid-spacing').value) || 7;
  const unit = currentUnit === 'in' ? 'in' : 'mm';
  const flatTop = orientation === 'flat-top';
  const sizing = hexSizingMode;

  const cx = W / 2;
  const cy = H / 2 - 4;
  const R = 48;
  const angleOff = flatTop ? 0 : Math.PI / 6;

  const verts = [];
  for (let k = 0; k < 6; k++) {
    const a = angleOff + k * Math.PI / 3;
    verts.push([cx + R * Math.cos(a), cy + R * Math.sin(a)]);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  verts.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
  ctx.closePath();
  ctx.stroke();

  let ax, ay, bx, by;
  const accent = '#e94560';

  if (sizing === 'side') {
    const sA = flatTop ? 4 : 3;
    [ax, ay] = verts[sA];
    [bx, by] = verts[(sA + 1) % 6];
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();

  } else if (sizing === 'flat-to-flat') {
    const s1a = flatTop ? 4 : 2, s1b = flatTop ? 5 : 3;
    const s2a = flatTop ? 1 : 5, s2b = flatTop ? 2 : 0;
    ax = (verts[s1a][0] + verts[s1b][0]) / 2;
    ay = (verts[s1a][1] + verts[s1b][1]) / 2;
    bx = (verts[s2a][0] + verts[s2b][0]) / 2;
    by = (verts[s2a][1] + verts[s2b][1]) / 2;
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(...verts[s1a]); ctx.lineTo(...verts[s1b]); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(...verts[s2a]); ctx.lineTo(...verts[s2b]); ctx.stroke();

  } else {
    const vA = flatTop ? 3 : 4, vB = flatTop ? 0 : 1;
    [ax, ay] = verts[vA];
    [bx, by] = verts[vB];
    ctx.fillStyle = accent;
    [verts[vA], verts[vB]].forEach(([vx, vy]) => {
      ctx.beginPath(); ctx.arc(vx, vy, 4, 0, Math.PI * 2); ctx.fill();
    });
  }

  const dx = bx - ax, dy = by - ay;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len, ny = dx / len;
  const needsOff = sizing === 'side';
  const off = needsOff ? 14 : 0;
  const dax = ax + nx * off, day = ay + ny * off;
  const dbx = bx + nx * off, dby = by + ny * off;

  ctx.strokeStyle = accent;
  ctx.lineWidth = 1;
  ctx.setLineDash([]);

  if (needsOff) {
    ctx.beginPath(); ctx.moveTo(ax + nx * 4, ay + ny * 4); ctx.lineTo(dax + nx * 2, day + ny * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + nx * 4, by + ny * 4); ctx.lineTo(dbx + nx * 2, dby + ny * 2); ctx.stroke();
  }

  ctx.beginPath(); ctx.moveTo(dax, day); ctx.lineTo(dbx, dby); ctx.stroke();

  const arrowSz = 5;
  function arrow(px, py, dirx, diry) {
    const ux = dirx / len, uy = diry / len;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px - ux * arrowSz + uy * arrowSz * 0.4, py - uy * arrowSz - ux * arrowSz * 0.4);
    ctx.moveTo(px, py);
    ctx.lineTo(px - ux * arrowSz - uy * arrowSz * 0.4, py - uy * arrowSz + ux * arrowSz * 0.4);
    ctx.stroke();
  }
  arrow(dax, day, -dx, -dy);
  arrow(dbx, dby, dx, dy);

  const labelOff = needsOff ? 12 : 10;
  const midX = (dax + dbx) / 2 + nx * labelOff;
  const midY = (day + dby) / 2 + ny * labelOff;
  ctx.fillStyle = accent;
  ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(inputVal + ' ' + unit, midX, midY);

  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();

  const sideLen = hexInputToSide(inputVal, sizing);
  const hexW = flatTop ? 2 * sideLen : SQRT3 * sideLen;
  const hexH = flatTop ? SQRT3 * sideLen : 2 * sideLen;
  const dec = currentUnit === 'in' ? 3 : 1;
  const dimsEl = document.getElementById('hexDims');
  if (dimsEl) {
    dimsEl.innerHTML =
      'Width: <strong>' + hexW.toFixed(dec) + ' ' + unit + '</strong>' +
      ' · Height: <strong>' + hexH.toFixed(dec) + ' ' + unit + '</strong>';
  }
}

/* ── generatePDF ── full async pipeline ── */
async function generatePDF() {
  const generateBtn       = document.getElementById('generateBtn');
  const progressContainer = document.getElementById('progressContainer');
  const progressFill      = document.getElementById('progressFill');
  const statusText        = document.getElementById('statusText');

  generateBtn.disabled = true;
  progressContainer.classList.remove('hidden');
  statusText.textContent = 'Preparing...';
  statusText.className   = 'status-text';
  progressFill.style.width = '0%';

  try {
    const config = getConfig();

    // Validate margins
    if (config.marginTop + config.marginBottom >= config.paperH) {
      alert('Top + Bottom margins exceed page height. Please reduce them.');
      return;
    }
    if (config.marginLeft + config.marginRight >= config.paperW) {
      alert('Left + Right margins exceed page width. Please reduce them.');
      return;
    }

    // Validate page count
    const pageCount = config.pageCount;
    if (isNaN(pageCount) || pageCount < 1 || pageCount > 200) {
      alert('Page count must be between 1 and 200.');
      return;
    }

    // Validate spacing
    const checkSpacing = config.type === 'cornell' ? config.lineSpacing : config.spacing;
    if (checkSpacing / MM < 3) {
      alert(currentUnit === 'in' ? 'Spacing must be at least 0.118 in.' : 'Spacing must be at least 3 mm.');
      return;
    }

    const pdfDoc = await PDFDocument.create();

    for (let i = 0; i < pageCount; i++) {
      const page = pdfDoc.addPage([config.paperW, config.paperH]);

      if (config.type === 'dot-grid')         drawDotGrid(page, config);
      else if (config.type === 'ruled')        drawRuled(page, config);
      else if (config.type === 'square-grid')  drawSquareGrid(page, config);
      else if (config.type === 'isometric')    drawIsometric(page, config);
      else if (config.type === 'hex-grid')     drawHexGrid(page, config);
      else if (config.type === 'cornell')      drawCornell(page, config);

      progressFill.style.width = `${((i + 1) / pageCount * 100).toFixed(0)}%`;
      statusText.textContent   = `Processing page ${i + 1} of ${pageCount}...`;

      await new Promise(r => setTimeout(r, 0));
    }

    statusText.textContent = 'Saving PDF...';
    const bytes = await pdfDoc.save();

    const filename = `${config.type}-${config.paperSizeKey}-${pageCount}p.pdf`;
    downloadBlob(bytes, filename, 'application/pdf');

    statusText.textContent = `Done! ${pageCount} page${pageCount > 1 ? 's' : ''} generated.`;
    statusText.className   = 'status-text done';

  } catch (err) {
    statusText.textContent = 'Error: ' + err.message;
    statusText.className   = 'status-text error';
    console.error(err);
  } finally {
    generateBtn.disabled = false;
  }
}

/* downloadBlob — fully implemented */
function downloadBlob(bytes, filename, mime) {
  const blob = new Blob([bytes], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* ── Event wiring (T7) ── */
document.addEventListener('DOMContentLoaded', () => {
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      const type = tab.dataset.type;
      document.getElementById('panel-' + type).classList.add('active');
      loadPreset(type);
      updatePreview();
    });
  });

  // Paper size toggle
  document.querySelectorAll('[data-size]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const activeType = document.querySelector('.tab.active').dataset.type;
      if (activeType === 'cornell') loadPreset('cornell');
      updatePreview();
    });
  });

  // Unit toggle
  document.querySelectorAll('[data-unit]').forEach(btn => {
    btn.addEventListener('click', () => toggleUnit(btn.dataset.unit));
  });

  // Color swatch selection
  document.querySelectorAll('.swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      updatePreview();
    });
  });

  // Opacity slider — update label + debounced preview
  let previewTimer;
  const opacitySlider = document.getElementById('opacitySlider');
  const opacityLabel  = document.getElementById('opacityLabel');
  opacitySlider.addEventListener('input', () => {
    opacityLabel.textContent = parseFloat(opacitySlider.value).toFixed(2);
    clearTimeout(previewTimer);
    previewTimer = setTimeout(updatePreview, 100);
  });

  // All number inputs — debounced preview
  document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('input', () => {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(updatePreview, 100);
    });
  });

  // Major interval show/hide
  document.getElementById('square-grid-majorInterval').addEventListener('input', () => {
    const val = parseInt(document.getElementById('square-grid-majorInterval').value) || 0;
    document.getElementById('square-grid-majorWeight-field').style.display = val > 0 ? '' : 'none';
    document.getElementById('square-grid-majorOpacity-field').style.display = val > 0 ? '' : 'none';
  });

  // Dot shape change
  document.getElementById('dot-grid-shape').addEventListener('change', () => {
    updatePreview();
  });

  document.getElementById('ruled-marginLine').addEventListener('change', () => {
    const checked = document.getElementById('ruled-marginLine').checked;
    document.getElementById('ruled-marginLine-controls').style.display = checked ? '' : 'none';
    updatePreview();
  });

  document.getElementById('ruled-headerLine').addEventListener('change', () => {
    const checked = document.getElementById('ruled-headerLine').checked;
    document.getElementById('ruled-headerLine-controls').style.display = checked ? '' : 'none';
    updatePreview();
  });

  // Midlines toggle
  document.getElementById('ruled-midlines').addEventListener('change', () => {
    updatePreview();
  });

  // Isometric mode show/hide
  document.getElementById('isometric-mode').addEventListener('change', () => {
    const mode = document.getElementById('isometric-mode').value;
    document.getElementById('isometric-dotSize-field').style.display = mode === 'dots' ? '' : 'none';
    updatePreview();
  });

  // Hex-grid mode show/hide + orientation change
  document.getElementById('hex-grid-mode').addEventListener('change', () => {
    const mode = document.getElementById('hex-grid-mode').value;
    document.getElementById('hex-grid-dotSize-field').style.display = mode === 'dots' ? '' : 'none';
    updatePreview();
  });

  document.getElementById('hex-grid-orientation').addEventListener('change', () => {
    updateHexDiagram();
    updatePreview();
  });

  document.getElementById('hex-grid-hideIncomplete').addEventListener('change', () => {
    updatePreview();
  });

  document.getElementById('hex-grid-sizing').addEventListener('change', () => {
    const newMode = document.getElementById('hex-grid-sizing').value;
    const input = document.getElementById('hex-grid-spacing');
    const label = document.getElementById('hex-grid-spacing-label');
    const oldVal = parseFloat(input.value);
    const sideLen = hexInputToSide(oldVal, hexSizingMode);
    const newVal = sideToHexInput(sideLen, newMode);
    const dec = currentUnit === 'in' ? 3 : 2;
    input.value = +newVal.toFixed(dec);
    hexSizingMode = newMode;
    const names = { side: 'Side Length', 'flat-to-flat': 'Flat-to-Flat', 'point-to-point': 'Point-to-Point' };
    const unitSuffix = currentUnit === 'in' ? '(in)' : '(mm)';
    label.textContent = names[newMode] + ' ' + unitSuffix;
    updateHexDiagram();
    updatePreview();
  });

  // Cornell fill pattern show/hide
  document.getElementById('cornell-fillPattern').addEventListener('change', () => {
    const fp = document.getElementById('cornell-fillPattern').value;
    document.getElementById('cornell-dotSize-field').style.display = fp === 'dot-grid' ? '' : 'none';
    document.getElementById('cornell-gridWeight-field').style.display = fp === 'square-grid' ? '' : 'none';
    updatePreview();
  });

  document.querySelectorAll('.margin-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      document.querySelectorAll('.margin-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      updatePreview();
    });
  });

  // Generate button
  document.getElementById('generateBtn').addEventListener('click', generatePDF);

  loadPreset('dot-grid');
  updatePreview();
  updateHexDiagram();
});
</script>
